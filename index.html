<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>E&O QA Checklist — iGUIDE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --green:      #1A9E72;
  --green-dark: #0D5C42;
  --green-dim:  #E6F5F0;
  --l1-bg:      #FEFAE8; --l1-bdr: #E6C84A; --l1-txt: #7A5300;
  --l2-bg:      #FEF1EA; --l2-bdr: #E07840; --l2-txt: #7A2E00;
  --l3-bg:      #FEEBEB; --l3-bdr: #D94040; --l3-txt: #7A0000;
  --pol-bg:     #F2F2EF; --pol-bdr: #AAAAAA; --pol-txt: #444440;
  --err-row:    #FDE8E8;
  --bg:         #F5F4F0;
  --surface:    #FFFFFF;
  --border:     #E2E1DC;
  --text:       #1A1A16;
  --muted:      #888884;
  --radius:     10px;
  --font:       'DM Sans', sans-serif;
  --mono:       'DM Mono', monospace;
}

/* ── DARK MODE ── */
[data-theme="dark"] {
  --green:      #22C98F;
  --green-dark: #0D5C42;
  --green-dim:  #0D2E22;
  --l1-bg:      #2A2410; --l1-bdr: #9A8420; --l1-txt: #E6C84A;
  --l2-bg:      #2A1A0E; --l2-bdr: #C05A20; --l2-txt: #E07840;
  --l3-bg:      #2A1010; --l3-bdr: #B02020; --l3-txt: #E05050;
  --pol-bg:     #1E1E1C; --pol-bdr: #666660; --pol-txt: #AAAAAA;
  --err-row:    #2A1212;
  --bg:         #111110;
  --surface:    #1A1A18;
  --border:     #2E2E2A;
  --text:       #E8E8E4;
  --muted:      #666662;
}

/* dark mode overrides for elements that use hardcoded colors */
[data-theme="dark"] .item:nth-child(even)       { background: #1E1E1C; }
[data-theme="dark"] .item:hover                  { background: #242422; }
[data-theme="dark"] .item.active                 { background: var(--err-row) !important; }
[data-theme="dark"] .item.active .itext          { color: #E05050; }
[data-theme="dark"] .check-box                   { background: #2A2A28; border-color: #444440; }
[data-theme="dark"] .lvl-input                   { background: #222220; color: var(--text); border-color: #2E2E2A; }
[data-theme="dark"] .lvl-input.has-l1            { background: var(--l1-bg); color: var(--l1-txt); }
[data-theme="dark"] .lvl-input.has-l2            { background: var(--l2-bg); color: var(--l2-txt); }
[data-theme="dark"] .lvl-input.has-l3            { background: var(--l3-bg); color: var(--l3-txt); }
[data-theme="dark"] .lvl-total-val               { background: #1A1A18; border-color: #2E2E2A; }
[data-theme="dark"] .lvl-total-val.active        { background: #2A1212; color: #E05050; border-color: #B02020; }
[data-theme="dark"] .yn-btn                      { background: #222220; color: var(--muted); }
[data-theme="dark"] .yn-btn.yes.active           { background: #B02020; color: white; border-color: #B02020; }
[data-theme="dark"] .yn-btn.no.active            { background: #3A3A38; color: white; }
[data-theme="dark"] .item.active .yn-wrap        { border-color: #B02020; }
[data-theme="dark"] .meta-field                  { background: #222220; }
[data-theme="dark"] .meta-input                  { color: var(--text); }
[data-theme="dark"] .status-strip                { background: var(--surface); }
[data-theme="dark"] .topbar                      { background: var(--surface); }
[data-theme="dark"] .sum-card                    { background: #222220; }
[data-theme="dark"] .report-table td             { background: var(--surface); }
[data-theme="dark"] .report-table tr:nth-child(even) td { background: #1E1E1C; }
[data-theme="dark"] .report-table tr:nth-child(even) td.rt-level-l1 { background: var(--l1-bg); }
[data-theme="dark"] .report-table tr:nth-child(even) td.rt-level-l2 { background: var(--l2-bg); }
[data-theme="dark"] .report-table tr:nth-child(even) td.rt-level-l3 { background: var(--l3-bg); }
[data-theme="dark"] .report-table tr:nth-child(even) td.rt-level-pol { background: var(--pol-bg); }
[data-theme="dark"] .copy-hint                   { background: #2A2410; border-color: #9A8420; color: #E6C84A; }
[data-theme="dark"] .no-errors-msg h3            { color: var(--text); }
[data-theme="dark"] .sum-table td                { background: var(--surface); }
[data-theme="dark"] .sum-table tr:nth-child(even) td { background: #1E1E1C; }
[data-theme="dark"] #view-checklist .items-wrap  { border-color: var(--border); }
[data-theme="dark"] .btn-reset-tab               { color: var(--muted); border-color: var(--border); }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  min-height: 100vh;
}

/* ── LAYOUT ── */
.shell { display: flex; height: 100vh; overflow: hidden; }

.sidebar {
  width: 220px;
  flex-shrink: 0;
  background: var(--green-dark);
  display: flex;
  flex-direction: column;
  padding: 0;
  overflow-y: auto;
}

.sidebar-brand {
  padding: 20px 18px 16px;
  border-bottom: 1px solid rgba(255,255,255,.1);
}
.sidebar-brand .logo {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 6px;
}
.logo-box {
  width: 28px; height: 28px;
  background: var(--green);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--mono);
  font-size: 11px; font-weight: 500;
  color: white;
  letter-spacing: -.5px;
}
.logo-name { font-size: 13px; font-weight: 600; color: white; }
.sidebar-sub { font-size: 10px; color: rgba(255,255,255,.45); margin-top: 2px; }

.nav-section-label {
  padding: 16px 18px 6px;
  font-size: 9px;
  font-weight: 600;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: rgba(255,255,255,.35);
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 18px;
  cursor: pointer;
  color: rgba(255,255,255,.65);
  font-size: 12.5px;
  font-weight: 400;
  transition: all .12s;
  border-left: 2px solid transparent;
  position: relative;
}
.nav-item:hover { color: white; background: rgba(255,255,255,.06); }
.nav-item.active {
  color: white;
  background: rgba(255,255,255,.1);
  border-left-color: var(--green);
  font-weight: 500;
}
.nav-badge {
  margin-left: auto;
  font-size: 10px;
  font-family: var(--mono);
  background: rgba(255,255,255,.15);
  color: rgba(255,255,255,.8);
  padding: 1px 6px;
  border-radius: 99px;
  min-width: 20px;
  text-align: center;
}
.nav-badge.has-errors { background: #D94040; color: white; }
.nav-badge.report-badge { background: var(--green); color: white; }

.sidebar-bottom {
  margin-top: auto;
  padding: 14px 18px;
  border-top: 1px solid rgba(255,255,255,.1);
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.btn-theme {
  width: 100%;
  padding: 7px;
  background: rgba(255,255,255,.08);
  border: 1px solid rgba(255,255,255,.15);
  border-radius: 6px;
  color: rgba(255,255,255,.7);
  font-size: 11.5px;
  font-family: var(--font);
  cursor: pointer;
  transition: all .15s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}
.btn-theme:hover { background: rgba(255,255,255,.15); color: white; }
.btn-reset-all {
  width: 100%;
  padding: 7px;
  background: rgba(217,64,64,.18);
  border: 1px solid rgba(217,64,64,.35);
  border-radius: 6px;
  color: #FFAAAA;
  font-size: 11.5px;
  font-family: var(--font);
  cursor: pointer;
  transition: all .12s;
}
.btn-reset-all:hover { background: rgba(217,64,64,.3); }

/* ── MAIN ── */
.main { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }

.topbar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 14px 28px;
  display: flex;
  align-items: center;
  gap: 16px;
  flex-shrink: 0;
  flex-wrap: wrap;
}
.topbar-title { font-size: 15px; font-weight: 600; flex-shrink: 0; }
.topbar-meta { display: flex; gap: 8px; flex: 1; flex-wrap: wrap; }
.meta-field {
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 7px;
  padding: 4px 10px;
}
.meta-label { font-size: 10px; color: var(--muted); font-weight: 500; }
.meta-input {
  border: none; background: none; outline: none;
  font-size: 12px; color: var(--text); font-family: var(--font);
  width: 110px;
}

/* ── STATUS BAR ── */
.status-strip {
  display: flex;
  gap: 8px;
  padding: 10px 28px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  flex-wrap: wrap;
  align-items: center;
}
.status-pill {
  display: flex; align-items: center; gap: 6px;
  padding: 4px 12px;
  border-radius: 99px;
  font-size: 12px; font-weight: 500;
  font-family: var(--mono);
}
.sp-ok  { background: var(--green-dim); color: var(--green-dark); }
.sp-l1  { background: var(--l1-bg); color: var(--l1-txt); border: 1px solid var(--l1-bdr); }
.sp-l2  { background: var(--l2-bg); color: var(--l2-txt); border: 1px solid var(--l2-bdr); }
.sp-l3  { background: var(--l3-bg); color: var(--l3-txt); border: 1px solid var(--l3-bdr); }
.sp-pol { background: var(--pol-bg); color: var(--pol-txt); border: 1px solid var(--pol-bdr); }
.sp-total { background: var(--text); color: white; }
.status-dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; opacity: .7; }
.status-save { margin-left: auto; font-size: 11px; color: var(--muted); font-style: italic; }

/* ── CONTENT ── */
.content { padding: 24px 28px; flex: 1; }

/* ── SECTION (flat list, no section headers) ── */
.items-wrap {
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  margin-bottom: 16px;
}

.item {
  display: flex; align-items: flex-start; gap: 11px;
  padding: 9px 14px;
  cursor: pointer;
  transition: background .09s;
  border-bottom: 1px solid var(--border);
}
.item:last-child { border-bottom: none; }
.item:nth-child(even) { background: #FAFAF8; }
.item:hover { background: #F0F0EB; }
.item.active { background: var(--err-row) !important; }
.item.active .itext { color: #7A0000; }

.itext {
  font-size: 12.5px; line-height: 1.5;
  color: var(--text);
  user-select: none;
  flex: 1;
}
.item-note {
  display: block;
  font-size: 10.5px;
  color: var(--muted);
  font-style: italic;
  margin-top: 2px;
  line-height: 1.4;
}

/* ── INLINE LEVEL BADGE ── */
.item-lvl-badge {
  flex-shrink: 0;
  font-size: 9px; font-weight: 700;
  font-family: var(--mono);
  padding: 2px 7px; border-radius: 99px;
  letter-spacing: .04em;
  align-self: center;
  white-space: nowrap;
}
.ilb-l1  { background: var(--l1-bg);  color: var(--l1-txt);  border: 1px solid var(--l1-bdr); }
.ilb-l2  { background: var(--l2-bg);  color: var(--l2-txt);  border: 1px solid var(--l2-bdr); }
.ilb-l3  { background: var(--l3-bg);  color: var(--l3-txt);  border: 1px solid var(--l3-bdr); }

.btn-reset-tab {
  display: inline-flex; align-items: center; gap: 5px;
  margin-top: 14px;
  padding: 6px 14px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 11.5px; font-family: var(--font);
  color: var(--muted);
  cursor: pointer;
  transition: all .12s;
}
.btn-reset-tab:hover { border-color: #D94040; color: #D94040; background: var(--l3-bg); }

/* ── SIMPLE SCALE SELECTOR ── */
.scale-wrap {
  display: flex; align-items: center; gap: 3px;
  flex-shrink: 0; align-self: center;
}
.scale-btn {
  padding: 0 10px; height: 28px;
  border: 1.5px solid var(--border);
  border-radius: 6px;
  font-size: 10px; font-weight: 700;
  font-family: var(--mono);
  cursor: pointer; transition: all .12s;
  background: var(--bg); color: var(--muted);
  letter-spacing: .03em;
}
.scale-btn:hover { border-color: var(--green); color: var(--green); }
.scale-btn.active-l1 { background: var(--l1-bg); color: var(--l1-txt); border-color: var(--l1-bdr); }
.scale-btn.active-l2 { background: var(--l2-bg); color: var(--l2-txt); border-color: var(--l2-bdr); }
.scale-btn.active-l3 { background: var(--l3-bg); color: var(--l3-txt); border-color: var(--l3-bdr); }
[data-theme="dark"] .scale-btn { background: #222220; color: var(--muted); }

/* ── BINARY YES / NO ── */
.yn-wrap {
  display: flex; align-items: center; gap: 0;
  flex-shrink: 0; align-self: center;
  border-radius: 7px; overflow: hidden;
  border: 1.5px solid var(--border);
  height: 28px;
}
.yn-btn {
  padding: 0 12px; height: 28px;
  border: none; font-size: 11px; font-weight: 600;
  font-family: var(--mono);
  cursor: pointer; transition: all .12s;
  background: var(--bg); color: var(--muted);
  letter-spacing: .03em;
}
.yn-btn.yes { border-right: 1.5px solid var(--border); }
.yn-btn.yes:hover  { background: #1D9E72; color: white; }
.yn-btn.no:hover   { background: #888; color: white; }
.yn-btn.yes.active { background: #D94040; color: white; border-color: #D94040; }
.yn-btn.no.active  { background: #4A4A48; color: white; }
.item.active .yn-wrap { border-color: #D94040; }

/* ── REPETIBLE LEVEL INPUTS ── */
.item { cursor: default; }
.item.active { background: var(--err-row) !important; }
.item.active .itext { color: #7A0000; }

.lvl-inputs {
  display: flex; align-items: center; gap: 6px;
  flex-shrink: 0; align-self: flex-start;
  margin-top: 4px;
  flex-wrap: nowrap;
}
.lvl-field {
  display: flex; flex-direction: column;
  align-items: center; gap: 2px;
}
.lvl-label {
  font-size: 9px; font-weight: 700;
  font-family: var(--mono);
  letter-spacing: .04em;
}
.lbl-l1 { color: var(--l1-txt); }
.lbl-l2 { color: var(--l2-txt); }
.lbl-l3 { color: var(--l3-txt); }
.lvl-input {
  width: 40px; height: 30px;
  border: 1.5px solid var(--border);
  border-radius: 6px;
  background: var(--surface);
  color: var(--text);
  font-size: 13px; font-weight: 600;
  font-family: var(--mono);
  text-align: center;
  outline: none;
  transition: border-color .12s;
  -moz-appearance: textfield;
}
.lvl-input::-webkit-outer-spin-button,
.lvl-input::-webkit-inner-spin-button { -webkit-appearance: none; }
.lvl-input:focus { border-color: var(--green); }
.lvl-input.has-l1 { border-color: var(--l1-bdr); background: var(--l1-bg); color: var(--l1-txt); }
.lvl-input.has-l2 { border-color: var(--l2-bdr); background: var(--l2-bg); color: var(--l2-txt); }
.lvl-input.has-l3 { border-color: var(--l3-bdr); background: var(--l3-bg); color: var(--l3-txt); }
.lvl-total {
  display: flex; flex-direction: column;
  align-items: center; gap: 2px;
}
.lvl-total-label {
  font-size: 9px; font-weight: 700;
  font-family: var(--mono); color: var(--muted);
  letter-spacing: .04em;
}
.lvl-total-val {
  width: 34px; height: 30px;
  border: 1.5px solid var(--border);
  border-radius: 6px;
  background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700;
  font-family: var(--mono);
  color: var(--muted);
}
.lvl-total-val.active { color: #D94040; border-color: #D94040; background: #FFF0F0; }

.qty-badge {
  display: inline-flex; align-items: center;
  font-size: 10px; font-weight: 700;
  font-family: var(--mono);
  padding: 1px 6px; border-radius: 99px;
  margin-left: 4px;
  vertical-align: middle;
}
.qb-l1  { background: var(--l1-bg); color: var(--l1-txt); border: 1px solid var(--l1-bdr); }
.qb-l2  { background: var(--l2-bg); color: var(--l2-txt); border: 1px solid var(--l2-bdr); }
.qb-l3  { background: var(--l3-bg); color: var(--l3-txt); border: 1px solid var(--l3-bdr); }
.qb-pol { background: var(--pol-bg); color: var(--pol-txt); }
.qb-yes { background: var(--l3-bg); color: var(--l3-txt); border: 1px solid var(--l3-bdr); }

/* ── ERROR REPORT VIEW ── */
.report-view { padding: 24px 28px; }
.report-header {
  display: flex; align-items: flex-start; gap: 14px;
  margin-bottom: 18px;
  flex-wrap: wrap;
}
.report-title { font-size: 18px; font-weight: 600; }
.report-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
.report-actions { margin-left: auto; display: flex; gap: 8px; }

.btn-copy {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 16px;
  background: var(--green-dark);
  color: white; border: none;
  border-radius: 8px;
  font-size: 12.5px; font-family: var(--font); font-weight: 500;
  cursor: pointer;
  transition: background .12s;
}
.btn-copy:hover { background: var(--green); }
.btn-copy.copied { background: #2A7A55; }
.btn-excel {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 16px;
  background: #1D6F3E;
  color: white; border: none;
  border-radius: 8px;
  font-size: 12.5px; font-family: var(--font); font-weight: 500;
  cursor: pointer;
  transition: background .12s;
}
.btn-excel:hover { background: #27924F; }

.no-errors-msg {
  text-align: center;
  padding: 60px 20px;
  color: var(--muted);
}
.no-errors-icon { font-size: 36px; margin-bottom: 10px; }
.no-errors-msg h3 { font-size: 15px; color: var(--text); margin-bottom: 6px; }
.no-errors-msg p  { font-size: 12.5px; }

.report-table { width: 100%; border-collapse: collapse; }
.report-table th {
  text-align: left;
  font-size: 10px; font-weight: 600;
  text-transform: uppercase; letter-spacing: .06em;
  color: white;
  background: var(--green-dark);
  padding: 8px 12px;
  border: 1px solid var(--green-dark);
}
.report-table td {
  padding: 8px 12px;
  font-size: 12px;
  border: 1px solid var(--border);
  vertical-align: top;
  line-height: 1.45;
}
.rt-del   { width: 120px; font-weight: 500; }
.rt-level { width: 100px; }
.rt-desc  { }
.rt-level-l1  { color: var(--l1-txt); background: var(--l1-bg); }
.rt-level-l2  { color: var(--l2-txt); background: var(--l2-bg); }
.rt-level-l3  { color: var(--l3-txt); background: var(--l3-bg); }
.rt-level-pol { color: var(--pol-txt); background: var(--pol-bg); }
.report-table tr:nth-child(even) td { background: #FAFAF8; }
.report-table tr:nth-child(even) td.rt-level-l1 { background: var(--l1-bg); }
.report-table tr:nth-child(even) td.rt-level-l2 { background: var(--l2-bg); }
.report-table tr:nth-child(even) td.rt-level-l3 { background: var(--l3-bg); }
.report-table tr:nth-child(even) td.rt-level-pol { background: var(--pol-bg); }

.copy-hint {
  margin-top: 14px;
  padding: 10px 14px;
  background: #FFFDE7;
  border: 1px solid #E6C84A;
  border-radius: 8px;
  font-size: 11.5px;
  color: #7A5300;
}

/* ── SUMMARY VIEW ── */
.summary-view { padding: 24px 28px; }
.summary-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 12px;
  margin-bottom: 24px;
}
.sum-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
}
.sum-card-lbl { font-size: 11px; color: var(--muted); font-weight: 500; margin-bottom: 4px; }
.sum-card-val { font-size: 28px; font-weight: 600; font-family: var(--mono); }
.sum-card.c-l1 .sum-card-val { color: var(--l1-txt); }
.sum-card.c-l2 .sum-card-val { color: var(--l2-txt); }

[data-theme="dark"] .item:nth-child(even) { background: #1E1E1C; }

</style>

<script>
// ── DATA ──────────────────────────────────────────────────────
// Each item: { desc, level, type, note?, scales? }
// type: 'repetible' | 'simple' | 'binary'
// scales: array of allowed levels for 'simple' type (e.g. ["L1","L2","L3"])
// note: optional clarification shown under the description
const TABS = ["Floor Plan","RCP","Elevation","Roof Plan","PDF"];

const DATA = {

"Floor Plan": [
  // ── L1 ──
  { level:"L1", type:"repetible", desc:'Windows: missing, undersized/oversized, wrong type, wrong wall side, or width not to nearest 1"' },

  { level:"L1", type:"binary",    desc:'Columns: missing or improperly sized/placed (nearest 1", dimensioned to wall nearest ¼")' },
  { level:"L1", type:"binary",    desc:"Missing single step/transition between rooms or floors" },
  { level:"L1", type:"binary",    desc:"Stair label UP/DN: missing, not moved off stair, incomplete arrow, or missing riser count" },
  { level:"L1", type:"binary",    desc:"Missing exterior features (decks, patios, porches) or improperly drafted/sized" },
  { level:"L1", type:"repetible", desc:"Partial missing or incorrect premium objects (wrong size, position, or type)" },
  { level:"L1", type:"repetible", desc:"Missing object detail lines (counters/ledges) — incomplete or not fully enclosed" },
  { level:"L1", type:"binary",    desc:"Failing to adjust bathroom partition walls based on point cloud" },
  { level:"L1", type:"simple",    desc:"Missing upper cabinet(s)", scales:["L1","L2","L3"], note:"L1 per component · L2 entire room · L3 per level" },
  { level:"L1", type:"binary",    desc:"Missing partial railings or minor adjustment required" },
  { level:"L1", type:"binary",    desc:"Room area boundaries showing up on other levels" },
  { level:"L1", type:"binary",    desc:"New or existing level in template not renamed" },
  { level:"L1", type:"simple",    desc:"Missing void 'X' detail line", scales:["L1","L2"], note:"L1 if isolated · L2 if missing from entire project" },
  { level:"L1", type:"repetible", desc:"Wall joint not edited to reflect one cohesive joint" },
  // ── L2 ──
  { level:"L2", type:"binary",    desc:"Minor misalignment affecting a couple of rooms or one floor (including vertical floor-to-floor)" },
  { level:"L2", type:"binary",    desc:"Minor re-drafting causing <2% SF change (e.g. 1000 SF → 1018 = 1.8%)" },
  { level:"L2", type:"binary",    desc:'Interior walls not to standardized sizes (4½", 6½", 8", 10" / 114, 165, 203, 254mm)' },
  { level:"L2", type:"binary",    desc:'Exterior walls not drafted to point cloud or not within ½" threshold' },
  { level:"L2", type:"binary",    desc:'Walls not dimensioned to ¼" wall-to-wall' },
  { level:"L2", type:"repetible", desc:"Missing a space that can be drafted within property boundary (e.g. bedroom closet)" },
  { level:"L2", type:"binary",    desc:"DXF/laser data misinterpretation (wall drafted to shelf, ignoring DXF lines)" },
  { level:"L2", type:"binary",    desc:"Stairs drafted to incorrect length, width, or shape" },
  { level:"L2", type:"binary",    desc:"Misinterpreting or intentionally ignoring operator/task notes" },
  { level:"L2", type:"repetible", desc:"Improper designation of restricted heights, ledges & bay windows using room separation lines" },
  { level:"L2", type:"binary",    desc:"Incorrect room label units — imperial vs metric causing wrong area/ceiling height" },
  { level:"L2", type:"binary",    desc:"New levels not set to 'Planitar' template or not at 10'-0\" spacing" },
  { level:"L2", type:"binary",    desc:"Missing a few ceiling heights on one level — minimal effort made" },
  { level:"L2", type:"binary",    desc:"Missing floor boundaries (minimal effort) — stairs, elevator, open to below" },
  { level:"L2", type:"binary",    desc:"Missing railings or major adjustment needed" },
  { level:"L2", type:"binary",    desc:"Missing all exterior structural elements (railings, half walls, columns)" },
  // ── L3 ──
  { level:"L3", type:"binary",    desc:"Major misalignment affecting large portion or entire property — no effort made" },
  { level:"L3", type:"binary",    desc:"Major re-drafting causing >2% SF change (e.g. 1000 SF → 1022 = 2.2%)" },
  { level:"L3", type:"binary",    desc:"Floor-to-floor exterior walls not correctly snapped (overlapping instead of inline)" },
  { level:"L3", type:"binary",    desc:"Drafting spaces that should not/cannot be drafted (unscanned, no data, doesn't exist)" },
  { level:"L3", type:"binary",    desc:"Missing a major space within property where sufficient data was provided" },
  { level:"L3", type:"binary",    desc:"Failing to create new level for verifiable detached structures" },
  { level:"L3", type:"binary",    desc:"Missing ceiling heights on Premium DWGs — no effort made in entire project" },
  { level:"L3", type:"binary",    desc:"Missing floor boundaries for all levels" },
  { level:"L3", type:"binary",    desc:"Failing to turn off underlay on all levels" },
  { level:"L3", type:"binary",    desc:"Failing to follow DWG/RVT/Add-On Deliverables (catch-all SOP error)" },
  { level:"L3", type:"binary",    desc:"Drafting standard property task as a premium file" },
  { level:"L3", type:"binary",    desc:"Drafting floors for exterior spaces (unless directed by Team Lead)" },
],

"RCP": [
  { level:"L1", type:"simple",    desc:"Missing bulkhead or visual override to dashed line for ceiling height changes", scales:["L1","L2"], note:"L1 if isolated · L2 if entire level" },
  { level:"L1", type:"simple",    desc:"Missing spot elevation on bulkheads or lowered ceilings", scales:["L1","L2","L3"], note:"L1 if isolated · L2 if entire level · L3 if all missing" },
  { level:"L1", type:"binary",    desc:"Missing skylight or ceiling cut-out for skylight/large opening" },
  { level:"L1", type:"repetible", desc:"Missing ceiling component", note:"L1 per item · L2 per room · L3 per level" },
  { level:"L1", type:"binary",    desc:"Windows on floor plan not reflected on RCP — failing to use plan region tool" },
  { level:"L2", type:"binary",    desc:"Missing individual ceilings" },
  { level:"L3", type:"binary",    desc:"Missing all ceilings/suspended/sloped/bulkheads — no effort made (L3 per level)" },
],

"Elevation": [
  { level:"L1", type:"repetible", desc:"Window height or sill height not set" },
  { level:"L1", type:"repetible", desc:"Door height not set or height offset incorrect" },
  { level:"L1", type:"repetible", desc:"Missing windowsill/header component" },
  { level:"L1", type:"repetible", desc:"Missing exterior component (exterior lighting, water sills, exhaust vents, etc.)", note:"L1 per item · L2 for entire elevation · L3 for all elevations" },
  { level:"L1", type:"simple",    desc:"Elevations detail lines need adjustment", scales:["L1","L2","L3"], note:"L1 minor adjustment · L2 major work needed · L3 missing detail lines" },
  { level:"L1", type:"simple",    desc:"Roof needs adjustment", scales:["L1","L2","L3"], note:"L1 minor adjustment · L2 major adjustment or missing segments · L3 missing roof — no effort made" },
  { level:"L1", type:"repetible", desc:"Missing slope annotation" },
  { level:"L1", type:"simple",    desc:"Missing dimension string", scales:["L1","L2"], note:"L1 isolated missing string · L2 missing on all elevations" },
  { level:"L1", type:"binary",    desc:"Elevations/walls not edited to reflect actual construction (minor — little editing needed)" },
  { level:"L1", type:"binary",    desc:"Any gaps in the structure/walls/joints" },
  { level:"L2", type:"binary",    desc:"Elevations/walls not edited to reflect actual construction (significant — little effort made)" },
  { level:"L3", type:"binary",    desc:"No effort made for elevations/walls materials and construction to reflect existing" },
],

"Roof Plan": [
  { level:"L1", type:"simple",    desc:"Roof needs adjustment", scales:["L1","L2"], note:"L1 minor adjustment · L2 major adjustment or missing segments" },
  { level:"L1", type:"simple",    desc:"Missing slope arrow on roof plan", scales:["L1","L2"], note:"L1 one missing · L2 multiple missing" },
  { level:"L1", type:"simple",    desc:"Missing soffit", scales:["L1","L2"], note:"L1 partial · L2 all soffits missing" },
  { level:"L1", type:"simple",    desc:"Missing gutter", scales:["L1","L2"], note:"L1 partial · L2 all gutters missing" },
  { level:"L1", type:"simple",    desc:"Gables not joined correctly", scales:["L1","L2"], note:"L1 partial · L2 all gables" },
  { level:"L2", type:"binary",    desc:"Incorrect family type of roof selected (sloped/flat) or not edited for thickness" },
  { level:"L3", type:"binary",    desc:"Missing roof — no effort made" },
],

"PDF": [
  { level:"L1", type:"simple",    desc:"QR code not placed or not aligned with all sheets", scales:["L1","L2"], note:"L1 one sheet · L2 all sheets affected" },
  { level:"L1", type:"simple",    desc:"North arrow not adjusted on sheets", scales:["L1","L2"], note:"L1 one sheet · L2 all sheets affected" },
  { level:"L1", type:"repetible", desc:"Property name not adjusted on sheet(s)", note:"L1 per sheet · L2 if all sheets affected" },
  { level:"L1", type:"binary",    desc:"Missing or incorrectly placed dimension on dimension plan (overlapping)" },
  { level:"L1", type:"binary",    desc:"Sheet numbers not in standard sequence" },
  { level:"L1", type:"binary",    desc:"Floor area not edited on sheet" },
  { level:"L2", type:"repetible", desc:"Missing original DXF with all layers in project per level", note:"L2 per level" },
  { level:"L2", type:"binary",    desc:"Multiple dimensions missing or misplaced on level" },
  { level:"L2", type:"repetible", desc:"Missing a sheet view or failing to create a new sheet", note:"L2 per sheet" },
  { level:"L2", type:"binary",    desc:"All floor areas not edited on sheet" },
  { level:"L3", type:"binary",    desc:"Dimension plan not completed" },
  { level:"L3", type:"binary",    desc:"All sheets not set up" },
  { level:"L3", type:"binary",    desc:"Missing floor area plans" },
],

};

const LEVEL_CFG = {
  L1: { name:"L1 — Minor",       tdCls:"rt-level-l1",  badgeCls:"ilb-l1"  },
  L2: { name:"L2 — Significant", tdCls:"rt-level-l2",  badgeCls:"ilb-l2"  },
  L3: { name:"L3 — Detrimental", tdCls:"rt-level-l3",  badgeCls:"ilb-l3"  },
};


// ── STATE ────────────────────────────────────────────────────
let state    = {};
let meta     = {};
let activeTab   = TABS[0];
let activeView  = 'checklist';

// Flat key: tab + item index only
function storageKey(tab, i) { return `eo2||${tab}||${i}`; }
const META_KEY = 'eo_meta';

function loadState() {
  try {
    const raw = localStorage.getItem('eo_state');
    state = raw ? JSON.parse(raw) : {};
    const m = localStorage.getItem(META_KEY);
    meta = m ? JSON.parse(m) : {};
  } catch(e) { state = {}; meta = {}; }
}

function saveState() {
  try {
    localStorage.setItem('eo_state', JSON.stringify(state));
    showSaved();
  } catch(e) {}
}

function saveMeta() {
  meta.wo       = document.getElementById('m-wo').value;
  meta.drafter  = document.getElementById('m-drafter').value;
  meta.reviewer = document.getElementById('m-reviewer').value;
  meta.date     = document.getElementById('m-date').value;
  try { localStorage.setItem(META_KEY, JSON.stringify(meta)); } catch(e) {}
}

let saveTimer;
function showSaved() {
  clearTimeout(saveTimer);
  const el = document.getElementById('save-indicator');
  el.textContent = 'Guardado ✓';
  saveTimer = setTimeout(() => { el.textContent = ''; }, 2000);
}

// ── COUNTS ───────────────────────────────────────────────────
function getItemRawLevel(item, raw) {
  // Returns the effective level string for a given state value
  if (item.type === 'simple') return (typeof raw === 'string') ? raw : null;
  if (item.type === 'repetible') {
    if (!raw || typeof raw !== 'object') return null;
    // highest level present
    if ((raw.l3||0) > 0) return 'L3';
    if ((raw.l2||0) > 0) return 'L2';
    return 'L1';
  }
  if (item.type === 'binary') return raw === 1 ? item.level : null;
  return null;
}

function getRepTotal(raw) {
  if (!raw || typeof raw !== 'object') return 0;
  return (raw.l1||0) + (raw.l2||0) + (raw.l3||0);
}

function getCounts(filterTab) {
  let l1=0, l2=0, l3=0;
  TABS.forEach(tab => {
    if (filterTab && tab !== filterTab) return;
    (DATA[tab] || []).forEach((item, i) => {
      const raw = state[storageKey(tab, i)];
      if (!raw) return;
      if (item.type === 'repetible') {
        if (typeof raw === 'object') {
          l1 += raw.l1 || 0;
          l2 += raw.l2 || 0;
          l3 += raw.l3 || 0;
        }
      } else if (item.type === 'simple') {
        if (raw === 'L1') l1++;
        else if (raw === 'L2') l2++;
        else if (raw === 'L3') l3++;
      } else {
        // binary: count at item's base level
        if (raw === 1) {
          if (item.level === 'L1') l1++;
          else if (item.level === 'L2') l2++;
          else if (item.level === 'L3') l3++;
        }
      }
    });
  });
  return { l1, l2, l3, total: l1+l2+l3 };
}

function getErrors() {
  const errors = [];
  TABS.forEach(tab => {
    (DATA[tab] || []).forEach((item, i) => {
      const raw = state[storageKey(tab, i)];
      if (!raw) return;
      if (item.type === 'repetible') {
        if (typeof raw === 'object') {
          const tot = getRepTotal(raw);
          if (tot > 0) errors.push({ tab, item, i, raw, qty: tot, type: 'repetible' });
        }
      } else if (item.type === 'simple') {
        if (typeof raw === 'string') errors.push({ tab, item, i, raw, qty: 1, type: 'simple' });
      } else {
        if (raw === 1) errors.push({ tab, item, i, raw, qty: 1, type: 'binary' });
      }
    });
  });
  return errors;
}

// ── UI UPDATES ───────────────────────────────────────────────
function updateCounters() {
  const c = getCounts();
  document.getElementById('cnt-l1').textContent  = c.l1;
  document.getElementById('cnt-l2').textContent  = c.l2;
  document.getElementById('cnt-l3').textContent  = c.l3;
  document.getElementById('cnt-tot').textContent = c.total;
  document.getElementById('nb-report').textContent = c.total;
  document.getElementById('nb-report').className =
    'nav-badge ' + (c.total > 0 ? 'has-errors' : 'report-badge');
  TABS.forEach(tab => {
    const el = document.getElementById('nb-' + tab);
    if (!el) return;
    const tc = getCounts(tab);
    el.textContent = tc.total || '';
    el.className = 'nav-badge ' + (tc.total > 0 ? 'has-errors' : '');
  });
}

// ── NAV TABS ─────────────────────────────────────────────────
function buildNav() {
  const container = document.getElementById('nav-tabs');
  container.innerHTML = TABS.map(tab => `
    <div class="nav-item ${tab===activeTab && activeView==='checklist' ? 'active' : ''}"
         id="navtab-${tab.replace(/\s/g,'_')}"
         onclick="switchTab('${tab}')">
      <span>${tab}</span>
      <span class="nav-badge" id="nb-${tab}"></span>
    </div>
  `).join('');
}

function updateNavActive() {
  ['checklist','report','summary'].forEach(v => {
    document.getElementById('nav-'+v).classList.toggle('active', activeView===v && v!=='checklist');
  });
  TABS.forEach(tab => {
    const el = document.getElementById('navtab-'+tab.replace(/\s/g,'_'));
    if (el) el.classList.toggle('active', tab===activeTab && activeView==='checklist');
  });
}

// ── BADGE HELPERS ─────────────────────────────────────────────
const BADGE_CFG = {
  L1: { cls:'ilb-l1', label:'L1' },
  L2: { cls:'ilb-l2', label:'L2' },
  L3: { cls:'ilb-l3', label:'L3' },
};

// For a rendered item, what level badge to show?
// simple/binary: use effective level from state if active, else base level
// repetible: use base level (inputs self-label with L1/L2/L3)
function effectiveBadge(item, raw) {
  if (item.type === 'simple' && typeof raw === 'string') return BADGE_CFG[raw] || BADGE_CFG[item.level];
  return BADGE_CFG[item.level] || BADGE_CFG['L1'];
}

// ── CHECKLIST RENDER ─────────────────────────────────────────
function renderChecklist() {
  const items = DATA[activeTab] || [];
  let html = '<div class="items-wrap">';

  items.forEach((item, i) => {
    const k   = storageKey(activeTab, i);
    const raw = state[k];
    let control, active;
    const badge = effectiveBadge(item, raw);

    if (item.type === 'repetible') {
      const v   = (raw && typeof raw === 'object') ? raw : {l1:0,l2:0,l3:0};
      const tot = getRepTotal(v);
      active = tot > 0;
      control = `
        <div class="lvl-inputs">
          <div class="lvl-field">
            <span class="lvl-label lbl-l1">L1</span>
            <input class="lvl-input ${v.l1>0?'has-l1':''}"
              type="number" min="0" value="${v.l1||0}"
              oninput="setLvl('${k}','l1',this.value)"
              onclick="this.select()" />
          </div>
          <div class="lvl-field">
            <span class="lvl-label lbl-l2">L2</span>
            <input class="lvl-input ${v.l2>0?'has-l2':''}"
              type="number" min="0" value="${v.l2||0}"
              oninput="setLvl('${k}','l2',this.value)"
              onclick="this.select()" />
          </div>
          <div class="lvl-field">
            <span class="lvl-label lbl-l3">L3</span>
            <input class="lvl-input ${v.l3>0?'has-l3':''}"
              type="number" min="0" value="${v.l3||0}"
              oninput="setLvl('${k}','l3',this.value)"
              onclick="this.select()" />
          </div>
          <div class="lvl-total">
            <span class="lvl-total-label">TOT</span>
            <div class="lvl-total-val ${tot>0?'active':''}">${tot||0}</div>
          </div>
        </div>`;

    } else if (item.type === 'simple') {
      const levels = item.scales || ['L1','L2','L3'];
      const selLvl = (typeof raw === 'string') ? raw : null;
      active = !!selLvl;
      const btns = levels.map(lv => {
        const isActive = selLvl === lv;
        const cls = isActive ? `active-${lv.toLowerCase()}` : '';
        return `<button class="scale-btn ${cls}" onclick="setScale('${k}','${lv}')">${lv}</button>`;
      }).join('');
      control = `<div class="scale-wrap">${btns}</div>`;

    } else {
      // binary
      active = raw === 1;
      const yesA = raw === 1 ? 'active' : '';
      const noA  = raw === 2 ? 'active' : '';
      control = `
        <div class="yn-wrap">
          <button class="yn-btn yes ${yesA}" onclick="setYN('${k}',1)">YES</button>
          <button class="yn-btn no  ${noA}"  onclick="setYN('${k}',2)">NO</button>
        </div>`;
    }

    const noteHtml = item.note
      ? `<span class="item-note">${item.note}</span>`
      : '';

    html += `
      <div class="item ${active ? 'active' : ''}">
        <span class="item-lvl-badge ${badge.cls}">${badge.label}</span>
        ${control}
        <span class="itext">${item.desc}${noteHtml}</span>
      </div>`;
  });

  html += `</div>`;
  html += `<button class="btn-reset-tab" onclick="resetTab()">↺ Reset ${activeTab}</button>`;
  document.getElementById('view-checklist').innerHTML = html;
}

function setLvl(k, level, val) {
  const n = Math.max(0, parseInt(val) || 0);
  const current = (state[k] && typeof state[k] === 'object') ? state[k] : {l1:0,l2:0,l3:0};
  const next = { ...current, [level]: n };
  if (next.l1===0 && next.l2===0 && next.l3===0) delete state[k];
  else state[k] = next;
  saveState(); updateCounters();
  if (activeView==='report')  renderReport();
  if (activeView==='summary') renderSummary();
}

function setScale(k, lv) {
  if (state[k] === lv) delete state[k];
  else state[k] = lv;
  saveState(); updateCounters(); renderChecklist();
  if (activeView==='report')  renderReport();
  if (activeView==='summary') renderSummary();
}

function setYN(k, val) {
  if (state[k] === val) delete state[k];
  else if (val === 2) delete state[k];
  else state[k] = val;
  saveState(); updateCounters(); renderChecklist();
  if (activeView==='report')  renderReport();
  if (activeView==='summary') renderSummary();
}

// ── GROUP ERRORS BY TAB ──────────────────────────────────────
function groupErrors() {
  const errors = getErrors();
  const grouped = {};
  TABS.forEach(tab => { grouped[tab] = []; });
  errors.forEach(e => { grouped[e.tab].push(e); });
  Object.keys(grouped).forEach(k => { if (!grouped[k].length) delete grouped[k]; });
  return grouped;
}

// ── REPORT RENDER ────────────────────────────────────────────
function renderReport() {
  const errors  = getErrors();
  const grouped = groupErrors();
  const c       = getCounts();
  const ORDER   = { L3:0, L2:1, L1:2 };

  let html = `
    <div class="report-header">
      <div>
        <div class="report-title">Error Report</div>
        <div class="report-sub">Errores agrupados por deliverable — listo para copiar al tracker</div>
      </div>
      <div class="report-actions">
        <button class="btn-copy" id="btn-copy" onclick="copyReport()">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="4" y="4" width="9" height="9" rx="1.5" stroke="white" stroke-width="1.4"/><path d="M4 3V2.5A1.5 1.5 0 0 0-1.5 0H1A1.5 1.5 0 0 0 2.5 1.5V2" stroke="white" stroke-width="1.4" transform="translate(1 1)"/></svg>
          Copiar para tracker
        </button>
        <button class="btn-excel" onclick="exportExcel()">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 2h6l4 4v7a1 1 0 0 1-1 1H2a1 1 0 0 1-1-1V3a1 1 0 0 1 1-1z" stroke="white" stroke-width="1.3" fill="none"/><path d="M8 2v4h4" stroke="white" stroke-width="1.3" fill="none"/><path d="M4.5 8.5l5 0M4.5 10.5l5 0" stroke="white" stroke-width="1.3" stroke-linecap="round"/></svg>
          Exportar a Excel
        </button>
      </div>
    </div>`;

  if (errors.length === 0) {
    html += `
      <div class="no-errors-msg">
        <div class="no-errors-icon">✅</div>
        <h3>Sin errores registrados</h3>
        <p>Marca errores en el checklist y aparecerán aquí automáticamente.</p>
      </div>`;
  } else {
    Object.entries(grouped).forEach(([tab, items]) => {
      // Totals by effective level
      let wl1=0, wl2=0, wl3=0;
      items.forEach(e => {
        let lv = e.item.level;
        if (e.type === 'simple' && typeof e.raw === 'string') lv = e.raw;
        if (lv==='L1') wl1 += e.qty;
        else if (lv==='L2') wl2 += e.qty;
        else if (lv==='L3') wl3 += e.qty;
      });
      const wTot = wl1+wl2+wl3;

      html += `
        <div style="margin-bottom:20px;">
          <div style="display:flex;align-items:center;gap:10px;padding:8px 14px;
                      background:var(--green-dark);border-radius:8px 8px 0 0;">
            <span style="font-size:13px;font-weight:600;color:white;">${tab}</span>
            <span style="margin-left:auto;font-size:11px;font-family:var(--mono);color:rgba(255,255,255,.7);">
              ${wTot} instancia(s)
              ${wl1 ? `&nbsp;· <span style="color:#FFE08A">L1: ${wl1}</span>` : ''}
              ${wl2 ? `&nbsp;· <span style="color:#FFBB88">L2: ${wl2}</span>` : ''}
              ${wl3 ? `&nbsp;· <span style="color:#FF9999">L3: ${wl3}</span>` : ''}
            </span>
          </div>
          <table class="report-table" style="border-radius:0 0 8px 8px;overflow:hidden;">
            <thead><tr>
              <th class="rt-level" style="width:120px;">Nivel</th>
              <th class="rt-desc">Descripción del Error</th>
            </tr></thead>
            <tbody>`;

      // Sort L3 → L2 → L1
      const sorted = [...items].sort((a,b) => {
        const la = (a.type==='simple' && typeof a.raw==='string') ? a.raw : a.item.level;
        const lb = (b.type==='simple' && typeof b.raw==='string') ? b.raw : b.item.level;
        return (ORDER[la]??9) - (ORDER[lb]??9);
      });

      sorted.forEach(({ item, raw, qty, type }) => {
        let effectiveLv = item.level;
        let badges = '';

        if (type === 'repetible' && typeof raw === 'object') {
          // Show highest level in badge column for sorting, breakdown as badges
          if ((raw.l3||0)>0) effectiveLv = 'L3';
          else if ((raw.l2||0)>0) effectiveLv = 'L2';
          if (raw.l1) badges += `<span class="qty-badge qb-l1">L1 ×${raw.l1}</span> `;
          if (raw.l2) badges += `<span class="qty-badge qb-l2">L2 ×${raw.l2}</span> `;
          if (raw.l3) badges += `<span class="qty-badge qb-l3">L3 ×${raw.l3}</span>`;
        } else if (type === 'simple' && typeof raw === 'string') {
          effectiveLv = raw;
          const qbCls = raw==='L1'?'qb-l1':raw==='L2'?'qb-l2':'qb-l3';
          badges = `<span class="qty-badge ${qbCls}">${raw}</span>`;
        } else {
          badges = `<span class="qty-badge qb-yes">✓</span>`;
        }

        const lvlCfg = LEVEL_CFG[effectiveLv] || LEVEL_CFG['L1'];
        html += `
              <tr>
                <td class="rt-level ${lvlCfg.tdCls}">${lvlCfg.name}</td>
                <td class="rt-desc">${item.desc} ${badges}</td>
              </tr>`;
      });

      html += `</tbody></table></div>`;
    });

    html += `
      <div class="copy-hint">
        💡 Haz clic en <b>Copiar para tracker</b> para pegar el reporte en tu celda de Excel.
      </div>`;
  }

  document.getElementById('view-report').innerHTML = html;
}

// ── EXPORT TO EXCEL ──────────────────────────────────────────
function exportExcel() {
  const errors = getErrors();
  if (errors.length === 0) { alert('No hay errores registrados para exportar.'); return; }

  const wo       = document.getElementById('m-wo').value || '';
  const drafter  = document.getElementById('m-drafter').value || '';
  const reviewer = document.getElementById('m-reviewer').value || '';
  const date_    = document.getElementById('m-date').value || '';
  const grouped  = groupErrors();
  const c        = getCounts();
  const ORDER    = { L3:0, L2:1, L1:2 };

  const wb = XLSX.utils.book_new();

  // Sheet 1: Error Report grouped
  const reportRows = [];
  reportRows.push(['E&O QA Report — iGUIDE / Planitar']);
  reportRows.push(['Work Order:', wo, 'Drafter:', drafter]);
  reportRows.push(['Date:', date_, 'Reviewer:', reviewer]);
  reportRows.push([`Total errors: ${errors.length}`, `L1: ${c.l1}`, `L2: ${c.l2}`, `L3: ${c.l3}`]);
  reportRows.push([]);

  Object.entries(grouped).forEach(([tab, items]) => {
    const wTotXl = items.reduce((s,e)=>s+e.qty,0);
    reportRows.push([tab.toUpperCase(), '', `(${wTotXl} instancia(s))`]);
    reportRows.push(['Nivel efectivo', 'Qty', 'Detalle', 'Descripción']);
    const sorted = [...items].sort((a,b)=>{
      const la=(a.type==='simple'&&typeof a.raw==='string')?a.raw:a.item.level;
      const lb=(b.type==='simple'&&typeof b.raw==='string')?b.raw:b.item.level;
      return (ORDER[la]??9)-(ORDER[lb]??9);
    });
    sorted.forEach(({ item, raw, qty, type }) => {
      let lv = item.level;
      let detalle = '';
      if (type==='repetible' && typeof raw==='object') {
        if ((raw.l3||0)>0) lv='L3'; else if ((raw.l2||0)>0) lv='L2';
        detalle = `L1:${raw.l1||0}  L2:${raw.l2||0}  L3:${raw.l3||0}`;
      } else if (type==='simple' && typeof raw==='string') {
        lv = raw; detalle = raw;
      } else {
        detalle = 'YES';
      }
      reportRows.push([LEVEL_CFG[lv]?.name || lv, qty, detalle, item.desc]);
    });
    reportRows.push([]);
  });

  const wsReport = XLSX.utils.aoa_to_sheet(reportRows);
  wsReport['!cols'] = [{ wch:22 },{ wch:8 },{ wch:22 },{ wch:80 }];
  XLSX.utils.book_append_sheet(wb, wsReport, 'Error Report');

  // Sheet 2: Summary
  const sumRows = [['Deliverable','L1 Minor','L2 Significant','L3 Detrimental','Total']];
  TABS.forEach(tab => {
    const tc = getCounts(tab);
    sumRows.push([tab, tc.l1, tc.l2, tc.l3, tc.total]);
  });
  sumRows.push([]);
  sumRows.push(['GRAND TOTAL', c.l1, c.l2, c.l3, c.total]);
  const wsSum = XLSX.utils.aoa_to_sheet(sumRows);
  wsSum['!cols'] = [{ wch:20 },{ wch:12 },{ wch:16 },{ wch:16 },{ wch:10 }];
  XLSX.utils.book_append_sheet(wb, wsSum, 'Summary');

  const filename = `EO_Report_${wo||'QA'}_${date_||new Date().toISOString().split('T')[0]}.xlsx`;
  XLSX.writeFile(wb, filename);
}

// ── COPY REPORT ──────────────────────────────────────────────
function copyReport() {
  const errors = getErrors();
  if (errors.length === 0) return;
  const wo       = document.getElementById('m-wo').value;
  const drafter  = document.getElementById('m-drafter').value;
  const reviewer = document.getElementById('m-reviewer').value;
  const date_    = document.getElementById('m-date').value;
  const grouped  = groupErrors();
  const c        = getCounts();
  const ORDER    = { L3:0, L2:1, L1:2 };

  let text = `E&O QA REPORT\n${'─'.repeat(40)}\n`;
  if (wo)       text += `Work Order: ${wo}\n`;
  if (drafter)  text += `Drafter:    ${drafter}\n`;
  if (reviewer) text += `Reviewer:   ${reviewer}\n`;
  if (date_)    text += `Date:       ${date_}\n`;
  text += `Total instancias: ${c.total}  (L1: ${c.l1}  L2: ${c.l2}  L3: ${c.l3})\n`;
  text += `${'─'.repeat(40)}\n\n`;

  Object.entries(grouped).forEach(([tab, items]) => {
    text += `▸ ${tab.toUpperCase()} (${items.length} error(es))\n`;
    const sorted = [...items].sort((a,b)=>{
      const la=(a.type==='simple'&&typeof a.raw==='string')?a.raw:a.item.level;
      const lb=(b.type==='simple'&&typeof b.raw==='string')?b.raw:b.item.level;
      return (ORDER[la]??9)-(ORDER[lb]??9);
    });
    sorted.forEach(({ item, raw, qty, type }) => {
      let lv = item.level;
      let detail = '';
      if (type==='repetible' && typeof raw==='object') {
        if ((raw.l3||0)>0) lv='L3'; else if ((raw.l2||0)>0) lv='L2';
        const parts=[];
        if(raw.l1) parts.push(`L1×${raw.l1}`);
        if(raw.l2) parts.push(`L2×${raw.l2}`);
        if(raw.l3) parts.push(`L3×${raw.l3}`);
        detail = parts.length ? `  [${parts.join(' · ')}]` : '';
      } else if (type==='simple' && typeof raw==='string') {
        lv = raw; detail = `  [${raw}]`;
      } else {
        detail = '  [YES]';
      }
      text += `  [${LEVEL_CFG[lv]?.name||lv}]${detail} ${item.desc}\n`;
    });
    text += '\n';
  });

  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('btn-copy');
    if (btn) {
      btn.textContent = '✓ Copiado!';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="4" y="4" width="9" height="9" rx="1.5" stroke="white" stroke-width="1.4"/><path d="M4 3V2.5A1.5 1.5 0 0 0-1.5 0H1A1.5 1.5 0 0 0 2.5 1.5V2" stroke="white" stroke-width="1.4" transform="translate(1 1)"/></svg> Copiar para tracker`;
        btn.classList.remove('copied');
      }, 2000);
    }
  });
}

// ── SUMMARY RENDER ───────────────────────────────────────────
function renderSummary() {
  const c = getCounts();
  let html = `
    <div class="report-title" style="margin-bottom:16px">Summary</div>
    <div class="summary-grid">
      <div class="sum-card c-l1"><div class="sum-card-lbl">L1 — Minor</div><div class="sum-card-val">${c.l1}</div></div>
      <div class="sum-card c-l2"><div class="sum-card-lbl">L2 — Significant</div><div class="sum-card-val">${c.l2}</div></div>
      <div class="sum-card c-l3"><div class="sum-card-lbl">L3 — Detrimental</div><div class="sum-card-val">${c.l3}</div></div>
      <div class="sum-card c-total"><div class="sum-card-lbl">Total</div><div class="sum-card-val">${c.total}</div></div>
    </div>
    <table class="sum-table">
      <thead>
        <tr><th>Deliverable</th><th>L1</th><th>L2</th><th>L3</th><th>Total</th></tr>
      </thead>
      <tbody>`;
  TABS.forEach(tab => {
    const tc = getCounts(tab);
    html += `
        <tr>
          <td><b>${tab}</b></td>
          <td class="num-cell num-l1">${tc.l1||'-'}</td>
          <td class="num-cell num-l2">${tc.l2||'-'}</td>
          <td class="num-cell num-l3">${tc.l3||'-'}</td>
          <td class="num-cell num-tot">${tc.total||'-'}</td>
        </tr>`;
  });
  html += `</tbody></table>`;
  document.getElementById('view-summary').innerHTML = html;
}

// ── NAVIGATION ───────────────────────────────────────────────
function switchView(v) {
  activeView = v;
  document.getElementById('view-checklist').style.display = v==='checklist' ? '' : 'none';
  document.getElementById('view-report').style.display    = v==='report'    ? '' : 'none';
  document.getElementById('view-summary').style.display   = v==='summary'   ? '' : 'none';
  document.getElementById('page-title').textContent =
    v==='checklist' ? activeTab :
    v==='report'    ? 'Error Report' : 'Summary';
  updateNavActive();
  if (v==='report')  renderReport();
  if (v==='summary') renderSummary();
}

function switchTab(tab) {
  activeTab = tab;
  switchView('checklist');
  renderChecklist();
  updateCounters();
}

function resetTab() {
  if (!confirm(`¿Limpiar todos los errores de "${activeTab}"?`)) return;
  (DATA[activeTab] || []).forEach((_,i) => { delete state[storageKey(activeTab,i)]; });
  saveState();
  renderChecklist();
  updateCounters();
}

function confirmResetAll() {
  if (!confirm('¿Limpiar TODO el checklist? Esta acción no se puede deshacer.')) return;
  state = {};
  saveState();
  renderChecklist();
  updateCounters();
  if (activeView==='report') renderReport();
  if (activeView==='summary') renderSummary();
}

// ── DARK MODE ────────────────────────────────────────────────
function toggleTheme() {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  const next = isDark ? 'light' : 'dark';
  applyTheme(next);
  try { localStorage.setItem('eo_theme', next); } catch(e) {}
}

function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme === 'dark' ? 'dark' : '');
  const icon  = document.getElementById('theme-icon');
  const label = document.getElementById('theme-label');
  if (icon)  icon.textContent  = theme === 'dark' ? '☀️' : '🌙';
  if (label) label.textContent = theme === 'dark' ? 'Modo claro' : 'Modo oscuro';
}

// ── INIT ─────────────────────────────────────────────────────
function init() {
  loadState();
  // Restore theme
  try {
    const savedTheme = localStorage.getItem('eo_theme') || 'light';
    applyTheme(savedTheme);
  } catch(e) {}
  // Restore meta
  document.getElementById('m-wo').value       = meta.wo       || '';
  document.getElementById('m-drafter').value  = meta.drafter  || '';
  document.getElementById('m-reviewer').value = meta.reviewer || '';
  document.getElementById('m-date').value     = meta.date     || new Date().toISOString().split('T')[0];
  buildNav();
  renderChecklist();
  updateCounters();
}

init();
</script>
