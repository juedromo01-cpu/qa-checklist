<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>E&O QA Checklist — iGUIDE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --green:      #1A9E72;
  --green-dark: #0D5C42;
  --green-dim:  #E6F5F0;
  --l1-bg:      #FEFAE8; --l1-bdr: #E6C84A; --l1-txt: #7A5300;
  --l2-bg:      #FEF1EA; --l2-bdr: #E07840; --l2-txt: #7A2E00;
  --l3-bg:      #FEEBEB; --l3-bdr: #D94040; --l3-txt: #7A0000;
  --pol-bg:     #F2F2EF; --pol-bdr: #AAAAAA; --pol-txt: #444440;
  --err-row:    #FDE8E8;
  --bg:         #F5F4F0;
  --surface:    #FFFFFF;
  --border:     #E2E1DC;
  --text:       #1A1A16;
  --muted:      #888884;
  --radius:     10px;
  --font:       'DM Sans', sans-serif;
  --mono:       'DM Mono', monospace;
}

/* ── DARK MODE ── */
[data-theme="dark"] {
  --green:      #22C98F;
  --green-dark: #0D5C42;
  --green-dim:  #0D2E22;
  --l1-bg:      #2A2410; --l1-bdr: #9A8420; --l1-txt: #E6C84A;
  --l2-bg:      #2A1A0E; --l2-bdr: #C05A20; --l2-txt: #E07840;
  --l3-bg:      #2A1010; --l3-bdr: #B02020; --l3-txt: #E05050;
  --pol-bg:     #1E1E1C; --pol-bdr: #666660; --pol-txt: #AAAAAA;
  --err-row:    #2A1212;
  --bg:         #111110;
  --surface:    #1A1A18;
  --border:     #2E2E2A;
  --text:       #E8E8E4;
  --muted:      #666662;
}

/* dark mode overrides for elements that use hardcoded colors */
[data-theme="dark"] .item:nth-child(even)       { background: #1E1E1C; }
[data-theme="dark"] .item:hover                  { background: #242422; }
[data-theme="dark"] .item.active                 { background: var(--err-row) !important; }
[data-theme="dark"] .item.active .itext          { color: #E05050; }
[data-theme="dark"] .check-box                   { background: #2A2A28; border-color: #444440; }
[data-theme="dark"] .lvl-input                   { background: #222220; color: var(--text); border-color: #2E2E2A; }
[data-theme="dark"] .lvl-input.has-l1            { background: var(--l1-bg); color: var(--l1-txt); }
[data-theme="dark"] .lvl-input.has-l2            { background: var(--l2-bg); color: var(--l2-txt); }
[data-theme="dark"] .lvl-input.has-l3            { background: var(--l3-bg); color: var(--l3-txt); }
[data-theme="dark"] .lvl-total-val               { background: #1A1A18; border-color: #2E2E2A; }
[data-theme="dark"] .lvl-total-val.active        { background: #2A1212; color: #E05050; border-color: #B02020; }
[data-theme="dark"] .yn-btn                      { background: #222220; color: var(--muted); }
[data-theme="dark"] .yn-btn.yes.active           { background: #B02020; color: white; border-color: #B02020; }
[data-theme="dark"] .yn-btn.no.active            { background: #3A3A38; color: white; }
[data-theme="dark"] .item.active .yn-wrap        { border-color: #B02020; }
[data-theme="dark"] .meta-field                  { background: #222220; }
[data-theme="dark"] .meta-input                  { color: var(--text); }
[data-theme="dark"] .status-strip                { background: var(--surface); }
[data-theme="dark"] .topbar                      { background: var(--surface); }
[data-theme="dark"] .sum-card                    { background: #222220; }
[data-theme="dark"] .report-table td             { background: var(--surface); }
[data-theme="dark"] .report-table tr:nth-child(even) td { background: #1E1E1C; }
[data-theme="dark"] .report-table tr:nth-child(even) td.rt-level-l1 { background: var(--l1-bg); }
[data-theme="dark"] .report-table tr:nth-child(even) td.rt-level-l2 { background: var(--l2-bg); }
[data-theme="dark"] .report-table tr:nth-child(even) td.rt-level-l3 { background: var(--l3-bg); }
[data-theme="dark"] .report-table tr:nth-child(even) td.rt-level-pol { background: var(--pol-bg); }
[data-theme="dark"] .copy-hint                   { background: #2A2410; border-color: #9A8420; color: #E6C84A; }
[data-theme="dark"] .no-errors-msg h3            { color: var(--text); }
[data-theme="dark"] .sum-table td                { background: var(--surface); }
[data-theme="dark"] .sum-table tr:nth-child(even) td { background: #1E1E1C; }
[data-theme="dark"] #view-checklist .items-wrap  { border-color: var(--border); }
[data-theme="dark"] .btn-reset-tab               { color: var(--muted); border-color: var(--border); }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  min-height: 100vh;
}

/* ── LAYOUT ── */
.shell { display: flex; height: 100vh; overflow: hidden; }

.sidebar {
  width: 220px;
  flex-shrink: 0;
  background: var(--green-dark);
  display: flex;
  flex-direction: column;
  padding: 0;
  overflow-y: auto;
}

.sidebar-brand {
  padding: 20px 18px 16px;
  border-bottom: 1px solid rgba(255,255,255,.1);
}
.sidebar-brand .logo {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 6px;
}
.logo-box {
  width: 28px; height: 28px;
  background: var(--green);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--mono);
  font-size: 11px; font-weight: 500;
  color: white;
  letter-spacing: -.5px;
}
.logo-name { font-size: 13px; font-weight: 600; color: white; }
.sidebar-sub { font-size: 10px; color: rgba(255,255,255,.45); margin-top: 2px; }

.nav-section-label {
  padding: 16px 18px 6px;
  font-size: 9px;
  font-weight: 600;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: rgba(255,255,255,.35);
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 18px;
  cursor: pointer;
  color: rgba(255,255,255,.65);
  font-size: 12.5px;
  font-weight: 400;
  transition: all .12s;
  border-left: 2px solid transparent;
  position: relative;
}
.nav-item:hover { color: white; background: rgba(255,255,255,.06); }
.nav-item.active {
  color: white;
  background: rgba(255,255,255,.1);
  border-left-color: var(--green);
  font-weight: 500;
}
.nav-badge {
  margin-left: auto;
  font-size: 10px;
  font-family: var(--mono);
  background: rgba(255,255,255,.15);
  color: rgba(255,255,255,.8);
  padding: 1px 6px;
  border-radius: 99px;
  min-width: 20px;
  text-align: center;
}
.nav-badge.has-errors { background: #D94040; color: white; }
.nav-badge.report-badge { background: var(--green); color: white; }

.sidebar-bottom {
  margin-top: auto;
  padding: 14px 18px;
  border-top: 1px solid rgba(255,255,255,.1);
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.btn-theme {
  width: 100%;
  padding: 7px;
  background: rgba(255,255,255,.08);
  border: 1px solid rgba(255,255,255,.15);
  border-radius: 6px;
  color: rgba(255,255,255,.7);
  font-size: 11.5px;
  font-family: var(--font);
  cursor: pointer;
  transition: all .15s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}
.btn-theme:hover { background: rgba(255,255,255,.15); color: white; }
.btn-reset-all {
  width: 100%;
  padding: 7px;
  background: rgba(217,64,64,.18);
  border: 1px solid rgba(217,64,64,.35);
  border-radius: 6px;
  color: #FFAAAA;
  font-size: 11.5px;
  font-family: var(--font);
  cursor: pointer;
  transition: all .12s;
}
.btn-reset-all:hover { background: rgba(217,64,64,.3); }

/* ── MAIN ── */
.main { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }

.topbar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 14px 28px;
  display: flex;
  align-items: center;
  gap: 16px;
  flex-shrink: 0;
  flex-wrap: wrap;
}
.topbar-title { font-size: 15px; font-weight: 600; flex-shrink: 0; }
.topbar-meta { display: flex; gap: 8px; flex: 1; flex-wrap: wrap; }
.meta-field {
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 7px;
  padding: 4px 10px;
}
.meta-label { font-size: 10px; color: var(--muted); font-weight: 500; }
.meta-input {
  border: none; background: none; outline: none;
  font-size: 12px; color: var(--text); font-family: var(--font);
  width: 110px;
}

/* ── STATUS BAR ── */
.status-strip {
  display: flex;
  gap: 8px;
  padding: 10px 28px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  flex-wrap: wrap;
  align-items: center;
}
.status-pill {
  display: flex; align-items: center; gap: 6px;
  padding: 4px 12px;
  border-radius: 99px;
  font-size: 12px; font-weight: 500;
  font-family: var(--mono);
}
.sp-ok  { background: var(--green-dim); color: var(--green-dark); }
.sp-l1  { background: var(--l1-bg); color: var(--l1-txt); border: 1px solid var(--l1-bdr); }
.sp-l2  { background: var(--l2-bg); color: var(--l2-txt); border: 1px solid var(--l2-bdr); }
.sp-l3  { background: var(--l3-bg); color: var(--l3-txt); border: 1px solid var(--l3-bdr); }
.sp-pol { background: var(--pol-bg); color: var(--pol-txt); border: 1px solid var(--pol-bdr); }
.sp-total { background: var(--text); color: white; }
.status-dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; opacity: .7; }
.status-save { margin-left: auto; font-size: 11px; color: var(--muted); font-style: italic; }

/* ── CONTENT ── */
.content { padding: 24px 28px; flex: 1; }

/* ── SECTION ── */
.section { margin-bottom: 22px; }
.section-header {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 14px;
  border-radius: 8px 8px 0 0;
  margin-bottom: 0;
}
.sh-l1  { background: var(--l1-bg); border: 1px solid var(--l1-bdr); border-bottom: none; }
.sh-l2  { background: var(--l2-bg); border: 1px solid var(--l2-bdr); border-bottom: none; }
.sh-l3  { background: var(--l3-bg); border: 1px solid var(--l3-bdr); border-bottom: none; }
.sh-pol { background: var(--pol-bg); border: 1px solid var(--pol-bdr); border-bottom: none; }
.level-pill {
  font-size: 10px; font-weight: 600; font-family: var(--mono);
  padding: 2px 8px; border-radius: 99px; letter-spacing: .03em;
}
.lp-l1  { background: var(--l1-bdr); color: white; }
.lp-l2  { background: var(--l2-bdr); color: white; }
.lp-l3  { background: var(--l3-bdr); color: white; }
.lp-pol { background: var(--pol-bdr); color: white; }
.section-name  { font-size: 12px; font-weight: 600; }
.section-name.c-l1  { color: var(--l1-txt); }
.section-name.c-l2  { color: var(--l2-txt); }
.section-name.c-l3  { color: var(--l3-txt); }
.section-name.c-pol { color: var(--pol-txt); }
.sec-count { margin-left: auto; font-size: 11px; font-family: var(--mono); font-weight: 600; color: #D94040; }

.items-wrap {
  border: 1px solid var(--border);
  border-radius: 0 0 8px 8px;
  overflow: hidden;
}
.sh-l1 + .items-wrap  { border-color: var(--l1-bdr); }
.sh-l2 + .items-wrap  { border-color: var(--l2-bdr); }
.sh-l3 + .items-wrap  { border-color: var(--l3-bdr); }
.sh-pol + .items-wrap { border-color: var(--pol-bdr); }

.item {
  display: flex; align-items: flex-start; gap: 11px;
  padding: 9px 14px;
  cursor: pointer;
  transition: background .09s;
  border-bottom: 1px solid var(--border);
}
.item:last-child { border-bottom: none; }
.item:nth-child(even) { background: #FAFAF8; }
.item:hover { background: #F0F0EB; }
.item.checked { background: var(--err-row) !important; }
.item.checked .itext { color: #7A0000; }

.check-box {
  width: 16px; height: 16px;
  border: 1.5px solid var(--border);
  border-radius: 4px;
  flex-shrink: 0;
  margin-top: 1px;
  display: flex; align-items: center; justify-content: center;
  transition: all .1s;
  background: white;
}
.item.checked .check-box {
  background: #D94040;
  border-color: #D94040;
}
.check-icon { display: none; }
.item.checked .check-icon { display: block; }

.itext {
  font-size: 12.5px; line-height: 1.5;
  color: var(--text);
  user-select: none;
  flex: 1;
}

.btn-reset-tab {
  display: inline-flex; align-items: center; gap: 5px;
  margin-top: 14px;
  padding: 6px 14px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 11.5px; font-family: var(--font);
  color: var(--muted);
  cursor: pointer;
  transition: all .12s;
}
.btn-reset-tab:hover { border-color: #D94040; color: #D94040; background: var(--l3-bg); }

/* ── SIMPLE SCALE SELECTOR ── */
.scale-wrap {
  display: flex; align-items: center; gap: 3px;
  flex-shrink: 0; align-self: center;
}
.scale-btn {
  padding: 0 10px; height: 28px;
  border: 1.5px solid var(--border);
  border-radius: 6px;
  font-size: 10px; font-weight: 700;
  font-family: var(--mono);
  cursor: pointer; transition: all .12s;
  background: var(--bg); color: var(--muted);
  letter-spacing: .03em;
}
.scale-btn:hover { border-color: var(--green); color: var(--green); }
.scale-btn.active-l1 { background: var(--l1-bg); color: var(--l1-txt); border-color: var(--l1-bdr); }
.scale-btn.active-l2 { background: var(--l2-bg); color: var(--l2-txt); border-color: var(--l2-bdr); }
.scale-btn.active-l3 { background: var(--l3-bg); color: var(--l3-txt); border-color: var(--l3-bdr); }
[data-theme="dark"] .scale-btn { background: #222220; color: var(--muted); }

/* ── BINARY YES / NO ── */
.yn-wrap {
  display: flex; align-items: center; gap: 0;
  flex-shrink: 0; align-self: center;
  border-radius: 7px; overflow: hidden;
  border: 1.5px solid var(--border);
  height: 28px;
}
.yn-btn {
  padding: 0 12px; height: 28px;
  border: none; font-size: 11px; font-weight: 600;
  font-family: var(--mono);
  cursor: pointer; transition: all .12s;
  background: var(--bg); color: var(--muted);
  letter-spacing: .03em;
}
.yn-btn.yes { border-right: 1.5px solid var(--border); }
.yn-btn.yes:hover  { background: #1D9E72; color: white; }
.yn-btn.no:hover   { background: #888; color: white; }
.yn-btn.yes.active { background: #D94040; color: white; border-color: #D94040; }
.yn-btn.no.active  { background: #4A4A48; color: white; }
.item.active .yn-wrap { border-color: #D94040; }

/* ── COUNTABLE LEVEL INPUTS ── */
.item { cursor: default; }
.item.active { background: var(--err-row) !important; }
.item.active .itext { color: #7A0000; }

.lvl-inputs {
  display: flex; align-items: center; gap: 6px;
  flex-shrink: 0; align-self: flex-start;
  margin-top: 4px;
  flex-wrap: nowrap;
}
.lvl-field {
  display: flex; flex-direction: column;
  align-items: center; gap: 2px;
}
.lvl-label {
  font-size: 9px; font-weight: 700;
  font-family: var(--mono);
  letter-spacing: .04em;
}
.lbl-l1 { color: var(--l1-txt); }
.lbl-l2 { color: var(--l2-txt); }
.lbl-l3 { color: var(--l3-txt); }
.lvl-input {
  width: 40px; height: 30px;
  border: 1.5px solid var(--border);
  border-radius: 6px;
  background: var(--surface);
  color: var(--text);
  font-size: 13px; font-weight: 600;
  font-family: var(--mono);
  text-align: center;
  outline: none;
  transition: border-color .12s;
  -moz-appearance: textfield;
}
.lvl-input::-webkit-outer-spin-button,
.lvl-input::-webkit-inner-spin-button { -webkit-appearance: none; }
.lvl-input:focus { border-color: var(--green); }
.lvl-input.has-l1 { border-color: var(--l1-bdr); background: var(--l1-bg); color: var(--l1-txt); }
.lvl-input.has-l2 { border-color: var(--l2-bdr); background: var(--l2-bg); color: var(--l2-txt); }
.lvl-input.has-l3 { border-color: var(--l3-bdr); background: var(--l3-bg); color: var(--l3-txt); }
.lvl-total {
  display: flex; flex-direction: column;
  align-items: center; gap: 2px;
}
.lvl-total-label {
  font-size: 9px; font-weight: 700;
  font-family: var(--mono); color: var(--muted);
  letter-spacing: .04em;
}
.lvl-total-val {
  width: 34px; height: 30px;
  border: 1.5px solid var(--border);
  border-radius: 6px;
  background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700;
  font-family: var(--mono);
  color: var(--muted);
}
.lvl-total-val.active { color: #D94040; border-color: #D94040; background: #FFF0F0; }

.qty-badge {
  display: inline-flex; align-items: center;
  font-size: 10px; font-weight: 700;
  font-family: var(--mono);
  padding: 1px 6px; border-radius: 99px;
  margin-left: 4px;
  vertical-align: middle;
}
.qb-l1  { background: var(--l1-bg); color: var(--l1-txt); border: 1px solid var(--l1-bdr); }
.qb-l2  { background: var(--l2-bg); color: var(--l2-txt); border: 1px solid var(--l2-bdr); }
.qb-l3  { background: var(--l3-bg); color: var(--l3-txt); border: 1px solid var(--l3-bdr); }
.qb-pol { background: var(--pol-bg); color: var(--pol-txt); }
.qb-yes { background: var(--l3-bg); color: var(--l3-txt); border: 1px solid var(--l3-bdr); }

/* ── ERROR REPORT VIEW ── */
.report-view { padding: 24px 28px; }
.report-header {
  display: flex; align-items: flex-start; gap: 14px;
  margin-bottom: 18px;
  flex-wrap: wrap;
}
.report-title { font-size: 18px; font-weight: 600; }
.report-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
.report-actions { margin-left: auto; display: flex; gap: 8px; }

.btn-copy {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 16px;
  background: var(--green-dark);
  color: white; border: none;
  border-radius: 8px;
  font-size: 12.5px; font-family: var(--font); font-weight: 500;
  cursor: pointer;
  transition: background .12s;
}
.btn-copy:hover { background: var(--green); }
.btn-copy.copied { background: #2A7A55; }
.btn-excel {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 16px;
  background: #1D6F3E;
  color: white; border: none;
  border-radius: 8px;
  font-size: 12.5px; font-family: var(--font); font-weight: 500;
  cursor: pointer;
  transition: background .12s;
}
.btn-excel:hover { background: #27924F; }

.no-errors-msg {
  text-align: center;
  padding: 60px 20px;
  color: var(--muted);
}
.no-errors-icon { font-size: 36px; margin-bottom: 10px; }
.no-errors-msg h3 { font-size: 15px; color: var(--text); margin-bottom: 6px; }
.no-errors-msg p  { font-size: 12.5px; }

.report-table { width: 100%; border-collapse: collapse; }
.report-table th {
  text-align: left;
  font-size: 10px; font-weight: 600;
  text-transform: uppercase; letter-spacing: .06em;
  color: white;
  background: var(--green-dark);
  padding: 8px 12px;
  border: 1px solid var(--green-dark);
}
.report-table td {
  padding: 8px 12px;
  font-size: 12px;
  border: 1px solid var(--border);
  vertical-align: top;
  line-height: 1.45;
}
.rt-del   { width: 120px; font-weight: 500; }
.rt-level { width: 100px; }
.rt-desc  { }
.rt-level-l1  { color: var(--l1-txt); background: var(--l1-bg); }
.rt-level-l2  { color: var(--l2-txt); background: var(--l2-bg); }
.rt-level-l3  { color: var(--l3-txt); background: var(--l3-bg); }
.rt-level-pol { color: var(--pol-txt); background: var(--pol-bg); }
.report-table tr:nth-child(even) td { background: #FAFAF8; }
.report-table tr:nth-child(even) td.rt-level-l1 { background: var(--l1-bg); }

function loadState() {

    const raw = localStorage.getItem('eo_state');
    state = raw ? JSON.parse(raw) : {};
    const m = localStorage.getItem(META_KEY);
    meta = m ? JSON.parse(m) : {};
  } catch(e) { state = {}; meta = {}; }
}

function saveState() {
  try {
    localStorage.setItem('eo_state', JSON.stringify(state));
    showSaved();
  } catch(e) {}
}

function saveMeta() {
  meta.wo       = document.getElementById('m-wo').value;

  meta.date     = document.getElementById('m-date').value;
  try { localStorage.setItem(META_KEY, JSON.stringify(meta)); } catch(e) {}
}

}

// ── COUNTS ───────────────────────────────────────────────────
function getCounts(filterTab) {
  let l1=0, l2=0, l3=0, pol=0;
  Object.entries(DATA).forEach(([tab, sections]) => {
    if (filterTab && tab !== filterTab) return;
    Object.entries(sections).forEach(([sec, items]) => {
      items.forEach((_, i) => {
        const k   = storageKey(tab, sec, i);
        const raw = state[k];
        if (!raw) return;

        if (COUNTABLE.has(`${tab}||${sec}||${i}`)) {
          // Repetible: state = {l1, l2, l3}
          if (typeof raw === 'object') {
            l1 += raw.l1 || 0;
            l2 += raw.l2 || 0;
            l3 += raw.l3 || 0;
          }

        } else if (SIMPLE_SCALE[`${tab}||${sec}||${i}`]) {
          // Simple scale: state = "L1" | "L2" | "L3"
          if (raw === 'L1') l1 += 1;
          else if (raw === 'L2') l2 += 1;
          else if (raw === 'L3') l3 += 1;

        } else {
          // Binary: 1=YES, 2=NO
          if (raw === 1) {
            if (sec === 'Policy') pol += 1;
            else if (sec === 'L1') l1 += 1;
            else if (sec === 'L2') l2 += 1;
            else if (sec === 'L3') l3 += 1;
          }
        }
      });
    });
  });
  return {l1, l2, l3, pol, total: l1+l2+l3+pol};
}

function getErrors() {
  const errors = [];
  TABS.forEach(tab => {
    const sections = DATA[tab];
    Object.entries(sections).forEach(([sec, items]) => {
      items.forEach((desc, i) => {
        const k   = storageKey(tab, sec, i);
        const raw = state[k];
        if (!raw) return;

        if (COUNTABLE.has(`${tab}||${sec}||${i}`)) {
          // Repetible: breakdown object
          if (typeof raw === 'object') {
            const tot = (raw.l1||0) + (raw.l2||0) + (raw.l3||0);
            if (tot > 0) errors.push({ tab, sec, desc, qty: tot, breakdown: raw, type: 'countable' });
          }

        } else if (SIMPLE_SCALE[`${tab}||${sec}||${i}`]) {
          // Simple scale: single level string
          if (typeof raw === 'string') {
            errors.push({ tab, sec, desc, qty: 1, breakdown: null, scaleLv: raw, type: 'scale' });
          }

        } else {
          // Binary
          if (raw === 1) errors.push({ tab, sec, desc, qty: 1, breakdown: null, type: 'binary' });
        }
      });
    });
  });
  return errors;
}

// ── CHECKLIST RENDER ─────────────────────────────────────────
function isCountable(tab, sec, i) {
  return COUNTABLE.has(`${tab}||${sec}||${i}`);
}

function isSimpleScale(tab, sec, i) {
  return !!SIMPLE_SCALE[`${tab}||${sec}||${i}`];
}

function getScaleLevels(tab, sec, i) {
  return SIMPLE_SCALE[`${tab}||${sec}||${i}`] || ["L1","L2","L3"];
}

function getCountableTotal(raw) {
  if (!raw || typeof raw !== 'object') return 0;
  return (raw.l1||0) + (raw.l2||0) + (raw.l3||0);
}

function renderChecklist() {
  const sections = DATA[activeTab];
  let html = '';
  Object.entries(sections).forEach(([sec, items]) => {
    const cfg = LEVEL_CFG[sec];
    // Section total — sum all error instances
    let secTotal = 0;
    items.forEach((_, i) => {
      const k = storageKey(activeTab, sec, i);
      const raw = state[k];
      if (!raw) return;
      if (isCountable(activeTab, sec, i)) secTotal += getCountableTotal(raw);
      else if (raw === 1) secTotal += 1;
    });

    html += `
      <div class="section">
        <div class="section-header ${cfg.bg}">
          <span class="level-pill ${cfg.pill}">${sec}</span>
          <span class="section-name ${cfg.cls}">${cfg.name}</span>
          ${secTotal ? `<span class="sec-count">${secTotal} instancia(s)</span>` : ''}
        </div>
        <div class="items-wrap">`;

    items.forEach((desc, i) => {
      const k          = storageKey(activeTab, sec, i);
      const raw        = state[k];
      const countable  = isCountable(activeTab, sec, i);
      const simpleScale = isSimpleScale(activeTab, sec, i);

      let control, active;

      if (countable) {
        // ── REPETIBLE: L1[ ] L2[ ] L3[ ] inputs ──────────────
        const v   = (raw && typeof raw === 'object') ? raw : {l1:0, l2:0, l3:0};
        const tot = getCountableTotal(v);
        active = tot > 0;
        control = `
          <div class="lvl-inputs">
            <div class="lvl-field">
              <span class="lvl-label lbl-l1">L1</span>
              <input class="lvl-input ${v.l1>0?'has-l1':''}"
                type="number" min="0" value="${v.l1||0}"
                oninput="setLvl('${k}','l1',this.value)"
                onclick="this.select()" />
            </div>
            <div class="lvl-field">
              <span class="lvl-label lbl-l2">L2</span>
              <input class="lvl-input ${v.l2>0?'has-l2':''}"
                type="number" min="0" value="${v.l2||0}"
                oninput="setLvl('${k}','l2',this.value)"
                onclick="this.select()" />
            </div>
            <div class="lvl-field">
              <span class="lvl-label lbl-l3">L3</span>
              <input class="lvl-input ${v.l3>0?'has-l3':''}"
                type="number" min="0" value="${v.l3||0}"
                oninput="setLvl('${k}','l3',this.value)"
                onclick="this.select()" />
            </div>
            <div class="lvl-total">
              <span class="lvl-total-label">TOT</span>
              <div class="lvl-total-val ${tot>0?'active':''}">${tot||0}</div>
            </div>
          </div>`;

      } else if (simpleScale) {
        // ── SIMPLE SCALE: single level selector ───────────────
        const levels  = getScaleLevels(activeTab, sec, i);
        // raw stores the selected level string: "L1", "L2", or "L3"
        const selLvl  = (typeof raw === 'string') ? raw : null;
        active = !!selLvl;
        const btns = levels.map(lv => {
          const isActive = selLvl === lv;
          const cls = isActive ? `active-${lv.toLowerCase()}` : '';
          return `<button class="scale-btn ${cls}" onclick="setScale('${k}','${lv}')">${lv}</button>`;
        }).join('');
        control = `<div class="scale-wrap">${btns}</div>`;

      } else {
        // ── BINARY: YES / NO ──────────────────────────────────
        active = raw === 1;
        const yesA = raw === 1 ? 'active' : '';
        const noA  = raw === 2 ? 'active' : '';
        control = `
          <div class="yn-wrap">
            <button class="yn-btn yes ${yesA}" onclick="setYN('${k}',1)">YES</button>
            <button class="yn-btn no  ${noA}"  onclick="setYN('${k}',2)">NO</button>
          </div>`;
      }

      html += `
          <div class="item ${active?'active':''}">
            ${control}
            <span class="itext">${desc}</span>
          </div>`;
    });
    html += `</div></div>`;
  });
  html += `<button class="btn-reset-tab" onclick="resetTab()">↺ Reset ${activeTab}</button>`;
  document.getElementById('view-checklist').innerHTML = html;
}

function setLvl(k, level, val) {
  const n = Math.max(0, parseInt(val) || 0);
  const current = (state[k] && typeof state[k] === 'object') ? state[k] : {l1:0, l2:0, l3:0};
  const next = { ...current, [level]: n };
  if (next.l1 === 0 && next.l2 === 0 && next.l3 === 0) delete state[k];
  else state[k] = next;
  saveState(); updateCounters();
  // Partial re-render: just update totals without full re-render to keep focus
  updateSectionCounts();
  if (activeView === 'report') renderReport();
  if (activeView === 'summary') renderSummary();
}

function updateSectionCounts() {
  // Update section headers and total badges without full re-render
  const sections = DATA[activeTab];
  Object.entries(sections).forEach(([sec, items]) => {
    let secTotal = 0;
    items.forEach((_, i) => {
      const k = storageKey(activeTab, sec, i);
      const raw = state[k];
      if (!raw) return;
      if (isCountable(activeTab, sec, i)) secTotal += getCountableTotal(raw);
      else if (raw === 1) secTotal += 1;
    });
    // Update total display for each item
    items.forEach((_, i) => {
      const k = storageKey(activeTab, sec, i);
      if (!isCountable(activeTab, sec, i)) return;
      const raw = state[k];
      const v   = (raw && typeof raw === 'object') ? raw : {l1:0,l2:0,l3:0};
      const tot = getCountableTotal(v);
      // Update input colors
      ['l1','l2','l3'].forEach(lv => {
        const inputs = document.querySelectorAll(`.lvl-input`);
        // handled via full re-render on blur
      });
    });
  });
}

function setScale(k, lv) {
  // Toggle: clicking active level deselects it
  if (state[k] === lv) delete state[k];
  else state[k] = lv;
  saveState(); updateCounters(); renderChecklist();
  if (activeView === 'report') renderReport();
  if (activeView === 'summary') renderSummary();
}

function setYN(k, val) {
  if (state[k] === val) delete state[k];
  else if (val === 2) delete state[k];
  else state[k] = val;
  saveState(); updateCounters(); renderChecklist();
  if (activeView === 'report') renderReport();
  if (activeView === 'summary') renderSummary();
}

// ── HELPERS ──────────────────────────────────────────────────
function getItemIndex(tab, sec, desc) {
  const items = DATA[tab]?.[sec] || [];
  return items.indexOf(desc);
}

// ── GROUP ERRORS BY DELIVERABLE ──────────────────────────────
function groupErrors() {
  const errors = getErrors();
  const grouped = {};
  TABS.forEach(tab => { grouped[tab] = []; });
  errors.forEach(e => { grouped[e.tab].push(e); });
  Object.keys(grouped).forEach(k => { if (!grouped[k].length) delete grouped[k]; });
  return grouped;
}

// ── REPORT RENDER ────────────────────────────────────────────
function renderReport() {
  const errors = getErrors();
  const grouped = groupErrors();
  const c = getCounts();

  let html = `
    <div class="report-header">

          Exportar a Excel
        </button>
      </div>
    </div>`;

  if (errors.length === 0) {

        <h3>Sin errores registrados</h3>
        <p>Marca errores en el checklist y aparecerán aquí automáticamente.</p>
      </div>`;
  } else {
    Object.entries(grouped).forEach(([tab, items]) => {

      // Weighted totals (sum of qty per level)
      const wl1  = items.filter(e=>e.sec==='L1').reduce((s,e)=>s+e.qty,0);
      const wl2  = items.filter(e=>e.sec==='L2').reduce((s,e)=>s+e.qty,0);
      const wl3  = items.filter(e=>e.sec==='L3').reduce((s,e)=>s+e.qty,0);
      const wpol = items.filter(e=>e.sec==='Policy').reduce((s,e)=>s+e.qty,0);
      const wTot = wl1+wl2+wl3+wpol;
      html += `
        <div style="margin-bottom:20px;">
          <div style="display:flex;align-items:center;gap:10px;padding:8px 14px;
                      background:var(--green-dark);border-radius:8px 8px 0 0;">
            <span style="font-size:13px;font-weight:600;color:white;">${tab}</span>
            <span style="margin-left:auto;font-size:11px;font-family:var(--mono);color:rgba(255,255,255,.7);">
              ${wTot} instancia(s)
              ${wl1  ? `· <span style="color:#FFE08A">L1: ${wl1}</span>`  : ''}
              ${wl2  ? `· <span style="color:#FFBB88">L2: ${wl2}</span>`  : ''}
              ${wl3  ? `· <span style="color:#FF9999">L3: ${wl3}</span>`  : ''}
              ${wpol ? `· <span style="color:#CCCCCC">Policy: ${wpol}</span>` : ''}
            </span>
          </div>
          <table class="report-table" style="border-radius:0 0 8px 8px;overflow:hidden;">
            <thead>
              <tr>
                <th class="rt-level" style="width:130px;">Nivel</th>
                <th class="rt-desc">Descripción del Error</th>
              </tr>
            </thead>
            <tbody>`;

      // Sort within deliverable: L3 first, then L2, L1, Policy
      const order = { L3: 0, L2: 1, L1: 2, Policy: 3 };
      const sorted = [...items].sort((a,b) => (order[a.sec]||9) - (order[b.sec]||9));

      sorted.forEach(({sec, desc, qty, breakdown, scaleLv, type}) => {
        const lvlCls  = LEVEL_TD[sec] || '';
        const lvlName = LEVEL_CFG[sec]?.name || sec;
        let badges = '';
        let effectiveLvl = lvlCls;

        if (type === 'countable' && breakdown) {
          if (breakdown.l1) badges += `<span class="qty-badge qb-l1">L1 ×${breakdown.l1}</span> `;
          if (breakdown.l2) badges += `<span class="qty-badge qb-l2">L2 ×${breakdown.l2}</span> `;
          if (breakdown.l3) badges += `<span class="qty-badge qb-l3">L3 ×${breakdown.l3}</span>`;
        } else if (type === 'scale' && scaleLv) {
          const qbCls = scaleLv==='L1'?'qb-l1':scaleLv==='L2'?'qb-l2':'qb-l3';

          badges = `<span class="qty-badge ${qbCls}">${scaleLv}</span>`;

          badges = `<span class="qty-badge qb-yes">YES</span>`;

              <tr>
                <td class="rt-level ${effectiveLvl}" style="width:130px;">${lvlName}</td>
                <td class="rt-desc">${desc} ${badges}</td>
              </tr>`;
      });

      html += `</tbody></table></div>`;
    });

    html += `
      <div class="copy-hint">
        💡 Haz clic en <b>Copiar para tracker</b> — se copia el reporte completo agrupado por deliverable, listo para pegar en tu celda de Excel.
      </div>`;
  }

  document.getElementById('view-report').innerHTML = html;
}

// ── EXPORT TO EXCEL ──────────────────────────────────────────
function exportExcel() {
  const errors = getErrors();
  if (errors.length === 0) { alert('No hay errores registrados para exportar.'); return; }

  const wo       = document.getElementById('m-wo').value || '';
  const drafter  = document.getElementById('m-drafter').value || '';
  const reviewer = document.getElementById('m-reviewer').value || '';
  const date_    = document.getElementById('m-date').value || '';
  const grouped  = groupErrors();
  const c        = getCounts();
  const order    = { L3: 0, L2: 1, L1: 2, Policy: 3 };

  const wb = XLSX.utils.book_new();

  // ── Sheet 1: Error Report (grouped) ──
  const reportRows = [];

  // Header block
  reportRows.push(['E&O QA Report — iGUIDE / Planitar']);
  reportRows.push(['Work Order:', wo,  'Drafter:', drafter]);
  reportRows.push(['Date:',      date_, 'Reviewer:', reviewer]);
  reportRows.push([`Total errors: ${errors.length}`, `L1: ${c.l1}`, `L2: ${c.l2}`, `L3: ${c.l3}`, `Policy: ${c.pol}`]);
  reportRows.push([]);

  Object.entries(grouped).forEach(([tab, items]) => {
    const wTotXl = items.reduce((s,e)=>s+e.qty,0);
    reportRows.push([tab.toUpperCase(), '', `(${wTotXl} instancia(s))`]);
    reportRows.push(['Nivel base', 'Total', 'Detalle L1/L2/L3', 'Descripción']);
    const sorted = [...items].sort((a,b) => (order[a.sec]||9) - (order[b.sec]||9));
    sorted.forEach(({sec, desc, qty, breakdown}) => {
      const lvlName = LEVEL_CFG[sec]?.name || sec;
      const detalle = breakdown
        ? `L1:${breakdown.l1||0}  L2:${breakdown.l2||0}  L3:${breakdown.l3||0}`
        : 'YES';
      reportRows.push([lvlName, qty, detalle, desc]);
    });
    reportRows.push([]);
  });

  const wsReport = XLSX.utils.aoa_to_sheet(reportRows);
  wsReport['!cols'] = [{ wch: 22 }, { wch: 80 }, { wch: 20 }, { wch: 20 }, { wch: 14 }];
  XLSX.utils.book_append_sheet(wb, wsReport, 'Error Report');

  // ── Sheet 2: Full flat list ──
  const flatRows = [['Deliverable', 'Level', 'Instances', 'Description']];
  TABS.forEach(tab => {
    Object.entries(DATA[tab]).forEach(([sec, items]) => {
      items.forEach((desc, i) => {
        const qty = state[storageKey(tab, sec, i)] || 0;
        const rawS = state[storageKey(tab, sec, i)];
        if (rawS) {
          if (COUNTABLE.has(`${tab}||${sec}||${i}`)) {
            const v   = (typeof rawS === 'object') ? rawS : {l1:0,l2:0,l3:0};
            const tot = (v.l1||0)+(v.l2||0)+(v.l3||0);
            if (tot > 0) {
              const brkd = `L1:${v.l1||0}  L2:${v.l2||0}  L3:${v.l3||0}`;
              flatRows.push([tab, LEVEL_CFG[sec]?.name || sec, tot, brkd, desc]);
            }
          } else if (SIMPLE_SCALE[`${tab}||${sec}||${i}`] && typeof rawS === 'string') {
            flatRows.push([tab, LEVEL_CFG[sec]?.name || sec, 1, rawS, desc]);
          } else if (rawS === 1) {
            flatRows.push([tab, LEVEL_CFG[sec]?.name || sec, 1, 'YES', desc]);
          }
        }
      });
    });
  });
  const wsFlat = XLSX.utils.aoa_to_sheet(flatRows);
  wsFlat['!cols'] = [{ wch: 18 }, { wch: 20 }, { wch: 90 }];
  XLSX.utils.book_append_sheet(wb, wsFlat, 'Flat List');

  // ── Sheet 3: Summary ──
  const sumRows = [
    ['Deliverable', 'L1 Minor', 'L2 Significant', 'L3 Detrimental', 'Policy', 'Total'],
  ];
  TABS.forEach(tab => {
    const tc = getCounts(tab);
    sumRows.push([tab, tc.l1, tc.l2, tc.l3, tc.pol, tc.total]);
  });
  sumRows.push([]);
  sumRows.push(['GRAND TOTAL', c.l1, c.l2, c.l3, c.pol, c.total]);
  const wsSum = XLSX.utils.aoa_to_sheet(sumRows);
  wsSum['!cols'] = [{ wch: 20 }, { wch: 12 }, { wch: 16 }, { wch: 16 }, { wch: 10 }, { wch: 10 }];
  XLSX.utils.book_append_sheet(wb, wsSum, 'Summary');

  // ── Download ──
  const filename = `EO_Report_${wo || 'QA'}_${date_ || new Date().toISOString().split('T')[0]}.xlsx`;
  XLSX.writeFile(wb, filename);
}

function copyReport() {
  const errors = getErrors();
  if (errors.length === 0) return;
  const wo       = document.getElementById('m-wo').value;
  const drafter  = document.getElementById('m-drafter').value;
  const reviewer = document.getElementById('m-reviewer').value;
  const date_    = document.getElementById('m-date').value;
  const grouped  = groupErrors();
  const c        = getCounts();

  let text = `E&O QA REPORT\n`;
  text += `${'─'.repeat(40)}\n`;
  if (wo)       text += `Work Order: ${wo}\n`;
  if (drafter)  text += `Drafter:    ${drafter}\n`;
  if (reviewer) text += `Reviewer:   ${reviewer}\n`;
  if (date_)    text += `Date:       ${date_}\n`;
  text += `Total instancias: ${c.total}`;
  text += `  (L1: ${c.l1}  L2: ${c.l2}  L3: ${c.l3}  Policy: ${c.pol})\n`;
  text += `${'─'.repeat(40)}\n\n`;

  const order = { L3: 0, L2: 1, L1: 2, Policy: 3 };

  Object.entries(grouped).forEach(([tab, items]) => {
    text += `▸ ${tab.toUpperCase()} (${items.length} error(es))\n`;
    const sorted = [...items].sort((a,b) => (order[a.sec]||9) - (order[b.sec]||9));
    sorted.forEach(({sec, desc, qty, breakdown, scaleLv, type}) => {
      const lvlName = LEVEL_CFG[sec]?.name || sec;
      let qtyStr = '';
      if (type === 'countable' && breakdown) {
        const parts = [];
        if (breakdown.l1) parts.push(`L1×${breakdown.l1}`);
        if (breakdown.l2) parts.push(`L2×${breakdown.l2}`);
        if (breakdown.l3) parts.push(`L3×${breakdown.l3}`);
        qtyStr = parts.length ? `  [${parts.join(' · ')}]` : '';
      } else if (type === 'scale' && scaleLv) {
        qtyStr = `  [${scaleLv}]`;
      } else {
        qtyStr = '  [YES]';
      }
      text += `  [${lvlName}]${qtyStr} ${desc}\n`;
    });
    text += `\n`;
  });

  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('btn-copy');
    if (btn) {
      btn.textContent = '✓ Copiado!';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="4" y="4" width="9" height="9" rx="1.5" stroke="white" stroke-width="1.4"/><path d="M4 3V2.5A1.5 1.5 0 0 0-1.5 0H1A1.5 1.5 0 0 0 2.5 1.5V2" stroke="white" stroke-width="1.4" transform="translate(1 1)"/></svg> Copiar para tracker`;
        btn.classList.remove('copied');
      }, 2000);
    }
  });
}

    const tc = getCounts(tab);
    html += `
        <tr>
          <td><b>${tab}</b></td>
          <td class="num-cell num-l1">${tc.l1||'-'}</td>
          <td class="num-cell num-l2">${tc.l2||'-'}</td>
          <td class="num-cell num-l3">${tc.l3||'-'}</td>
          <td class="num-cell num-pol">${tc.pol||'-'}</td>
          <td class="num-cell num-tot">${tc.total||'-'}</td>
        </tr>`;
  });
  html += `</tbody></table>`;
  document.getElementById('view-summary').innerHTML = html;
}

// ── NAVIGATION ───────────────────────────────────────────────
function switchView(v) {
  activeView = v;
  document.getElementById('view-checklist').style.display = v==='checklist' ? '' : 'none';
  document.getElementById('view-report').style.display    = v==='report'    ? '' : 'none';
  document.getElementById('view-summary').style.display   = v==='summary'   ? '' : 'none';
  document.getElementById('page-title').textContent =
    v==='checklist' ? activeTab :
    v==='report'    ? 'Error Report' : 'Summary';
  updateNavActive();
  if (v==='report')  renderReport();
  if (v==='summary') renderSummary();
}

function switchTab(tab) {
  activeTab = tab;
  switchView('checklist');
  renderChecklist();
  updateCounters();
}

function resetTab() {
  if (!confirm(`¿Limpiar todos los errores de "${activeTab}"?`)) return;
  Object.entries(DATA[activeTab]).forEach(([sec, items]) => {
    items.forEach((_,i) => { delete state[storageKey(activeTab,sec,i)]; });
  });
  saveState();
  renderChecklist();
  updateCounters();
}

function confirmResetAll() {
  if (!confirm('¿Limpiar TODO el checklist? Esta acción no se puede deshacer.')) return;
  state = {};
  saveState();
  renderChecklist();
  updateCounters();
  if (activeView==='report') renderReport();
  if (activeView==='summary') renderSummary();
}

// ── DARK MODE ────────────────────────────────────────────────
function toggleTheme() {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  const next = isDark ? 'light' : 'dark';
  applyTheme(next);
  try { localStorage.setItem('eo_theme', next); } catch(e) {}
}

function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme === 'dark' ? 'dark' : '');
  const icon  = document.getElementById('theme-icon');
  const label = document.getElementById('theme-label');
  if (icon)  icon.textContent  = theme === 'dark' ? '☀️' : '🌙';
  if (label) label.textContent = theme === 'dark' ? 'Modo claro' : 'Modo oscuro';
}

// ── INIT ─────────────────────────────────────────────────────
function init() {
  loadState();
  // Restore theme
  try {
    const savedTheme = localStorage.getItem('eo_theme') || 'light';
    applyTheme(savedTheme);
  } catch(e) {}
  // Restore meta
  document.getElementById('m-wo').value       = meta.wo       || '';
  document.getElementById('m-drafter').value  = meta.drafter  || '';
  document.getElementById('m-reviewer').value = meta.reviewer || '';
  document.getElementById('m-date').value     = meta.date     || new Date().toISOString().split('T')[0];
  buildNav();
  renderChecklist();
  updateCounters();
}

init();
</script>
