<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>E&O QA Checklist — iGUIDE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --green:      #1A9E72;
  --green-dark: #0D5C42;
  --green-dim:  #E6F5F0;
  --l1-bg:      #FEFAE8; --l1-bdr: #E6C84A; --l1-txt: #7A5300;
  --l2-bg:      #FEF1EA; --l2-bdr: #E07840; --l2-txt: #7A2E00;
  --l3-bg:      #FEEBEB; --l3-bdr: #D94040; --l3-txt: #7A0000;
  --pol-bg:     #F2F2EF; --pol-bdr: #AAAAAA; --pol-txt: #444440;
  --err-row:    #FDE8E8;
  --bg:         #F5F4F0;
  --surface:    #FFFFFF;
  --border:     #E2E1DC;
  --text:       #1A1A16;
  --muted:      #888884;
  --radius:     10px;
  --font:       'DM Sans', sans-serif;
  --mono:       'DM Mono', monospace;
}

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  min-height: 100vh;
}

/* ── LAYOUT ── */
.shell { display: flex; height: 100vh; overflow: hidden; }

.sidebar {
  width: 220px;
  flex-shrink: 0;
  background: var(--green-dark);
  display: flex;
  flex-direction: column;
  padding: 0;
  overflow-y: auto;
}

.sidebar-brand {
  padding: 20px 18px 16px;
  border-bottom: 1px solid rgba(255,255,255,.1);
}
.sidebar-brand .logo {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 6px;
}
.logo-box {
  width: 28px; height: 28px;
  background: var(--green);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--mono);
  font-size: 11px; font-weight: 500;
  color: white;
  letter-spacing: -.5px;
}
.logo-name { font-size: 13px; font-weight: 600; color: white; }
.sidebar-sub { font-size: 10px; color: rgba(255,255,255,.45); margin-top: 2px; }

.nav-section-label {
  padding: 16px 18px 6px;
  font-size: 9px;
  font-weight: 600;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: rgba(255,255,255,.35);
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 18px;
  cursor: pointer;
  color: rgba(255,255,255,.65);
  font-size: 12.5px;
  font-weight: 400;
  transition: all .12s;
  border-left: 2px solid transparent;
  position: relative;
}
.nav-item:hover { color: white; background: rgba(255,255,255,.06); }
.nav-item.active {
  color: white;
  background: rgba(255,255,255,.1);
  border-left-color: var(--green);
  font-weight: 500;
}
.nav-badge {
  margin-left: auto;
  font-size: 10px;
  font-family: var(--mono);
  background: rgba(255,255,255,.15);
  color: rgba(255,255,255,.8);
  padding: 1px 6px;
  border-radius: 99px;
  min-width: 20px;
  text-align: center;
}
.nav-badge.has-errors { background: #D94040; color: white; }
.nav-badge.report-badge { background: var(--green); color: white; }

.sidebar-bottom {
  margin-top: auto;
  padding: 14px 18px;
  border-top: 1px solid rgba(255,255,255,.1);
}
.btn-reset-all {
  width: 100%;
  padding: 7px;
  background: rgba(217,64,64,.18);
  border: 1px solid rgba(217,64,64,.35);
  border-radius: 6px;
  color: #FFAAAA;
  font-size: 11.5px;
  font-family: var(--font);
  cursor: pointer;
  transition: all .12s;
}
.btn-reset-all:hover { background: rgba(217,64,64,.3); }

/* ── MAIN ── */
.main { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }

.topbar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 14px 28px;
  display: flex;
  align-items: center;
  gap: 16px;
  flex-shrink: 0;
  flex-wrap: wrap;
}
.topbar-title { font-size: 15px; font-weight: 600; flex-shrink: 0; }
.topbar-meta { display: flex; gap: 8px; flex: 1; flex-wrap: wrap; }
.meta-field {
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 7px;
  padding: 4px 10px;
}
.meta-label { font-size: 10px; color: var(--muted); font-weight: 500; }
.meta-input {
  border: none; background: none; outline: none;
  font-size: 12px; color: var(--text); font-family: var(--font);
  width: 110px;
}

/* ── STATUS BAR ── */
.status-strip {
  display: flex;
  gap: 8px;
  padding: 10px 28px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  flex-wrap: wrap;
  align-items: center;
}
.status-pill {
  display: flex; align-items: center; gap: 6px;
  padding: 4px 12px;
  border-radius: 99px;
  font-size: 12px; font-weight: 500;
  font-family: var(--mono);
}
.sp-ok  { background: var(--green-dim); color: var(--green-dark); }
.sp-l1  { background: var(--l1-bg); color: var(--l1-txt); border: 1px solid var(--l1-bdr); }
.sp-l2  { background: var(--l2-bg); color: var(--l2-txt); border: 1px solid var(--l2-bdr); }
.sp-l3  { background: var(--l3-bg); color: var(--l3-txt); border: 1px solid var(--l3-bdr); }
.sp-pol { background: var(--pol-bg); color: var(--pol-txt); border: 1px solid var(--pol-bdr); }
.sp-total { background: var(--text); color: white; }
.status-dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; opacity: .7; }
.status-save { margin-left: auto; font-size: 11px; color: var(--muted); font-style: italic; }

/* ── CONTENT ── */
.content { padding: 24px 28px; flex: 1; }

/* ── SECTION ── */
.section { margin-bottom: 22px; }
.section-header {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 14px;
  border-radius: 8px 8px 0 0;
  margin-bottom: 0;
}
.sh-l1  { background: var(--l1-bg); border: 1px solid var(--l1-bdr); border-bottom: none; }
.sh-l2  { background: var(--l2-bg); border: 1px solid var(--l2-bdr); border-bottom: none; }
.sh-l3  { background: var(--l3-bg); border: 1px solid var(--l3-bdr); border-bottom: none; }
.sh-pol { background: var(--pol-bg); border: 1px solid var(--pol-bdr); border-bottom: none; }
.level-pill {
  font-size: 10px; font-weight: 600; font-family: var(--mono);
  padding: 2px 8px; border-radius: 99px; letter-spacing: .03em;
}
.lp-l1  { background: var(--l1-bdr); color: white; }
.lp-l2  { background: var(--l2-bdr); color: white; }
.lp-l3  { background: var(--l3-bdr); color: white; }
.lp-pol { background: var(--pol-bdr); color: white; }
.section-name  { font-size: 12px; font-weight: 600; }
.section-name.c-l1  { color: var(--l1-txt); }
.section-name.c-l2  { color: var(--l2-txt); }
.section-name.c-l3  { color: var(--l3-txt); }
.section-name.c-pol { color: var(--pol-txt); }
.sec-count { margin-left: auto; font-size: 11px; font-family: var(--mono); font-weight: 600; color: #D94040; }

.items-wrap {
  border: 1px solid var(--border);
  border-radius: 0 0 8px 8px;
  overflow: hidden;
}
.sh-l1 + .items-wrap  { border-color: var(--l1-bdr); }
.sh-l2 + .items-wrap  { border-color: var(--l2-bdr); }
.sh-l3 + .items-wrap  { border-color: var(--l3-bdr); }
.sh-pol + .items-wrap { border-color: var(--pol-bdr); }

.item {
  display: flex; align-items: flex-start; gap: 11px;
  padding: 9px 14px;
  cursor: pointer;
  transition: background .09s;
  border-bottom: 1px solid var(--border);
}
.item:last-child { border-bottom: none; }
.item:nth-child(even) { background: #FAFAF8; }
.item:hover { background: #F0F0EB; }
.item.checked { background: var(--err-row) !important; }
.item.checked .itext { color: #7A0000; }

.check-box {
  width: 16px; height: 16px;
  border: 1.5px solid var(--border);
  border-radius: 4px;
  flex-shrink: 0;
  margin-top: 1px;
  display: flex; align-items: center; justify-content: center;
  transition: all .1s;
  background: white;
}
.item.checked .check-box {
  background: #D94040;
  border-color: #D94040;
}
.check-icon { display: none; }
.item.checked .check-icon { display: block; }

.itext {
  font-size: 12.5px; line-height: 1.5;
  color: var(--text);
  user-select: none;
  flex: 1;
}

.btn-reset-tab {
  display: inline-flex; align-items: center; gap: 5px;
  margin-top: 14px;
  padding: 6px 14px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 11.5px; font-family: var(--font);
  color: var(--muted);
  cursor: pointer;
  transition: all .12s;
}
.btn-reset-tab:hover { border-color: #D94040; color: #D94040; background: var(--l3-bg); }

/* ── ERROR REPORT VIEW ── */
.report-view { padding: 24px 28px; }
.report-header {
  display: flex; align-items: flex-start; gap: 14px;
  margin-bottom: 18px;
  flex-wrap: wrap;
}
.report-title { font-size: 18px; font-weight: 600; }
.report-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
.report-actions { margin-left: auto; display: flex; gap: 8px; }

.btn-copy {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 16px;
  background: var(--green-dark);
  color: white; border: none;
  border-radius: 8px;
  font-size: 12.5px; font-family: var(--font); font-weight: 500;
  cursor: pointer;
  transition: background .12s;
}
.btn-copy:hover { background: var(--green); }
.btn-copy.copied { background: #2A7A55; }

.no-errors-msg {
  text-align: center;
  padding: 60px 20px;
  color: var(--muted);
}
.no-errors-icon { font-size: 36px; margin-bottom: 10px; }
.no-errors-msg h3 { font-size: 15px; color: var(--text); margin-bottom: 6px; }
.no-errors-msg p  { font-size: 12.5px; }

.report-table { width: 100%; border-collapse: collapse; }
.report-table th {
  text-align: left;
  font-size: 10px; font-weight: 600;
  text-transform: uppercase; letter-spacing: .06em;
  color: white;
  background: var(--green-dark);
  padding: 8px 12px;
  border: 1px solid var(--green-dark);
}
.report-table td {
  padding: 8px 12px;
  font-size: 12px;
  border: 1px solid var(--border);
  vertical-align: top;
  line-height: 1.45;
}
.rt-del   { width: 120px; font-weight: 500; }
.rt-level { width: 100px; }
.rt-desc  { }
.rt-level-l1  { color: var(--l1-txt); background: var(--l1-bg); }
.rt-level-l2  { color: var(--l2-txt); background: var(--l2-bg); }
.rt-level-l3  { color: var(--l3-txt); background: var(--l3-bg); }
.rt-level-pol { color: var(--pol-txt); background: var(--pol-bg); }
.report-table tr:nth-child(even) td { background: #FAFAF8; }
.report-table tr:nth-child(even) td.rt-level-l1 { background: var(--l1-bg); }
.report-table tr:nth-child(even) td.rt-level-l2 { background: var(--l2-bg); }
.report-table tr:nth-child(even) td.rt-level-l3 { background: var(--l3-bg); }
.report-table tr:nth-child(even) td.rt-level-pol { background: var(--pol-bg); }

.copy-hint {
  margin-top: 14px;
  padding: 10px 14px;
  background: #FFFDE7;
  border: 1px solid #E6C84A;
  border-radius: 8px;
  font-size: 11.5px;
  color: #7A5300;
}

/* ── SUMMARY VIEW ── */
.summary-view { padding: 24px 28px; }
.summary-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 12px;
  margin-bottom: 24px;
}
.sum-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
}
.sum-card-lbl { font-size: 11px; color: var(--muted); font-weight: 500; margin-bottom: 4px; }
.sum-card-val { font-size: 28px; font-weight: 600; font-family: var(--mono); }
.sum-card.c-l1 .sum-card-val { color: var(--l1-txt); }
.sum-card.c-l2 .sum-card-val { color: var(--l2-txt); }
.sum-card.c-l3 .sum-card-val { color: var(--l3-txt); }
.sum-card.c-pol .sum-card-val { color: var(--pol-txt); }
.sum-card.c-total .sum-card-val { color: var(--text); }

.sum-table { width: 100%; border-collapse: collapse; margin-top: 12px; }
.sum-table th {
  text-align: left; padding: 8px 12px;
  font-size: 10px; font-weight: 600;
  text-transform: uppercase; letter-spacing: .06em;
  background: var(--green-dark); color: white;
  border: 1px solid var(--green-dark);
}
.sum-table td {
  padding: 8px 12px; font-size: 12.5px;
  border: 1px solid var(--border);
}
.sum-table tr:nth-child(even) td { background: #FAFAF8; }
.num-cell { text-align: center; font-family: var(--mono); font-weight: 500; }
.num-l1 { color: var(--l1-txt); }
.num-l2 { color: var(--l2-txt); }
.num-l3 { color: var(--l3-txt); }
.num-pol { color: var(--pol-txt); }
.num-tot { font-weight: 700; }

@media (max-width: 620px) {
  .sidebar { width: 60px; }
  .sidebar-brand .logo-name, .nav-item span, .nav-section-label, .sidebar-sub { display: none; }
  .nav-badge { margin-left: 0; }
  .topbar { padding: 12px 16px; }
  .content, .report-view, .summary-view { padding: 16px; }
}
</style>
</head>
<body>

<div class="shell">
  <!-- SIDEBAR -->
  <nav class="sidebar">
    <div class="sidebar-brand">
      <div class="logo">
        <div class="logo-box">iG</div>
        <span class="logo-name">E&O QA</span>
      </div>
      <div class="sidebar-sub">DWG / Revit Checklist</div>
    </div>

    <div class="nav-section-label">Views</div>
    <div class="nav-item active" onclick="switchView('checklist')" id="nav-checklist">
      <span>Checklist</span>
    </div>
    <div class="nav-item" onclick="switchView('report')" id="nav-report">
      <span>Error Report</span>
      <span class="nav-badge report-badge" id="nb-report">0</span>
    </div>
    <div class="nav-item" onclick="switchView('summary')" id="nav-summary">
      <span>Summary</span>
    </div>

    <div class="nav-section-label">Deliverables</div>
    <div id="nav-tabs"></div>

    <div class="sidebar-bottom">
      <button class="btn-reset-all" onclick="confirmResetAll()">Reset completo</button>
    </div>
  </nav>

  <!-- MAIN -->
  <div class="main">
    <!-- TOPBAR -->
    <div class="topbar">
      <div class="topbar-title" id="page-title">Floor Plan</div>
      <div class="topbar-meta">
        <div class="meta-field">
          <span class="meta-label">WO</span>
          <input class="meta-input" id="m-wo" placeholder="Work Order ID" oninput="saveMeta()">
        </div>
        <div class="meta-field">
          <span class="meta-label">Drafter</span>
          <input class="meta-input" id="m-drafter" placeholder="Nombre" oninput="saveMeta()">
        </div>
        <div class="meta-field">
          <span class="meta-label">Reviewer</span>
          <input class="meta-input" id="m-reviewer" placeholder="Nombre" oninput="saveMeta()">
        </div>
        <div class="meta-field">
          <span class="meta-label">Fecha</span>
          <input class="meta-input" id="m-date" type="date" oninput="saveMeta()" style="width:120px">
        </div>
      </div>
    </div>

    <!-- STATUS STRIP -->
    <div class="status-strip" id="status-strip">
      <div class="status-pill sp-l1"><div class="status-dot"></div><span>L1: <b id="cnt-l1">0</b></span></div>
      <div class="status-pill sp-l2"><div class="status-dot"></div><span>L2: <b id="cnt-l2">0</b></span></div>
      <div class="status-pill sp-l3"><div class="status-dot"></div><span>L3: <b id="cnt-l3">0</b></span></div>
      <div class="status-pill sp-pol"><div class="status-dot"></div><span>Policy: <b id="cnt-pol">0</b></span></div>
      <div class="status-pill sp-total">Total: <b id="cnt-tot">0</b></div>
      <span class="status-save" id="save-indicator"></span>
    </div>

    <!-- CHECKLIST VIEW -->
    <div id="view-checklist" class="content"></div>

    <!-- REPORT VIEW -->
    <div id="view-report" class="report-view" style="display:none"></div>

    <!-- SUMMARY VIEW -->
    <div id="view-summary" class="summary-view" style="display:none"></div>
  </div>
</div>

const LEVEL_CFG = {
  L1:     { bg:"sh-l1",  pill:"lp-l1",  name:"L1 — Minor",       cls:"c-l1"  },
  L2:     { bg:"sh-l2",  pill:"lp-l2",  name:"L2 — Significant", cls:"c-l2"  },
  L3:     { bg:"sh-l3",  pill:"lp-l3",  name:"L3 — Detrimental", cls:"c-l3"  },
  Policy: { bg:"sh-pol", pill:"lp-pol", name:"Policy / Process",  cls:"c-pol" },
};

const LEVEL_TD = { L1:"rt-level-l1", L2:"rt-level-l2", L3:"rt-level-l3", Policy:"rt-level-pol" };

// ── STATE ────────────────────────────────────────────────────
let state    = {};
let meta     = {};
let activeTab   = TABS[0];
let activeView  = 'checklist';

function storageKey(tab, sec, i) { return `eo||${tab}||${sec}||${i}`; }
const META_KEY = 'eo_meta';

function loadState() {
  try {
    const raw = localStorage.getItem('eo_state');
    state = raw ? JSON.parse(raw) : {};
    const m = localStorage.getItem(META_KEY);
    meta = m ? JSON.parse(m) : {};
  } catch(e) { state = {}; meta = {}; }
}

function saveState() {
  try {
    localStorage.setItem('eo_state', JSON.stringify(state));
    showSaved();
  } catch(e) {}
}

function saveMeta() {
  meta.wo       = document.getElementById('m-wo').value;
  meta.drafter  = document.getElementById('m-drafter').value;
  meta.reviewer = document.getElementById('m-reviewer').value;
  meta.date     = document.getElementById('m-date').value;
  try { localStorage.setItem(META_KEY, JSON.stringify(meta)); } catch(e) {}
}

let saveTimer;
function showSaved() {
  clearTimeout(saveTimer);
  const el = document.getElementById('save-indicator');
  el.textContent = 'Guardado ✓';
  saveTimer = setTimeout(() => { el.textContent = ''; }, 2000);
}

// ── COUNTS ───────────────────────────────────────────────────
function getCounts(filterTab) {
  let l1=0,l2=0,l3=0,pol=0;
  Object.entries(DATA).forEach(([tab, sections]) => {
    if (filterTab && tab !== filterTab) return;
    Object.entries(sections).forEach(([sec, items]) => {
      items.forEach((_, i) => {
        if (!state[storageKey(tab,sec,i)]) return;
        if (sec==='Policy') pol++;
        else if (sec==='L1') l1++;
        else if (sec==='L2') l2++;
        else if (sec==='L3') l3++;
      });
    });
  });
  return {l1,l2,l3,pol,total:l1+l2+l3+pol};
}

function getErrors() {
  const errors = [];
  TABS.forEach(tab => {
    const sections = DATA[tab];
    Object.entries(sections).forEach(([sec, items]) => {
      items.forEach((desc, i) => {
        if (state[storageKey(tab,sec,i)]) {
          errors.push({ tab, sec, desc });
        }
      });
    });
  });
  return errors;
}

// ── UI UPDATES ───────────────────────────────────────────────
function updateCounters() {
  const c = getCounts();
  document.getElementById('cnt-l1').textContent  = c.l1;
  document.getElementById('cnt-l2').textContent  = c.l2;
  document.getElementById('cnt-l3').textContent  = c.l3;
  document.getElementById('cnt-pol').textContent = c.pol;
  document.getElementById('cnt-tot').textContent = c.total;
  document.getElementById('nb-report').textContent = c.total;
  document.getElementById('nb-report').className =
    'nav-badge ' + (c.total > 0 ? 'has-errors' : 'report-badge');

  // Update per-tab nav badges
  TABS.forEach(tab => {
    const el = document.getElementById('nb-' + tab);
    if (!el) return;
    const tc = getCounts(tab);
    el.textContent = tc.total || '';
    el.className = 'nav-badge ' + (tc.total > 0 ? 'has-errors' : '');
  });
}

// ── NAV TABS ─────────────────────────────────────────────────
function buildNav() {
  const container = document.getElementById('nav-tabs');
  container.innerHTML = TABS.map(tab => `
    <div class="nav-item ${tab===activeTab && activeView==='checklist' ? 'active' : ''}"
         id="navtab-${tab.replace(/\s/g,'_')}"
         onclick="switchTab('${tab}')">
      <span>${tab}</span>
      <span class="nav-badge" id="nb-${tab}"></span>
    </div>
  `).join('');
}

function updateNavActive() {
  ['checklist','report','summary'].forEach(v => {
    document.getElementById('nav-'+v).classList.toggle('active', activeView===v && v!=='checklist');
  });
  TABS.forEach(tab => {
    const el = document.getElementById('navtab-'+tab.replace(/\s/g,'_'));
    if (el) el.classList.toggle('active', tab===activeTab && activeView==='checklist');
  });
}

// ── CHECKLIST RENDER ─────────────────────────────────────────
function renderChecklist() {
  const sections = DATA[activeTab];
  let html = '';
  Object.entries(sections).forEach(([sec, items]) => {
    const cfg = LEVEL_CFG[sec];
    const cnt = items.filter((_,i) => state[storageKey(activeTab,sec,i)]).length;
    html += `
      <div class="section">
        <div class="section-header ${cfg.bg}">
          <span class="level-pill ${cfg.pill}">${sec}</span>
          <span class="section-name ${cfg.cls}">${cfg.name}</span>
          ${cnt ? `<span class="sec-count">${cnt} error(es)</span>` : ''}
        </div>
        <div class="items-wrap">`;
    items.forEach((desc, i) => {
      const k = storageKey(activeTab, sec, i);
      const checked = !!state[k];
      html += `
          <div class="item ${checked?'checked':''}" onclick="toggleItem('${k}')">
            <div class="check-box">
              <svg class="check-icon" width="10" height="8" viewBox="0 0 10 8" fill="none">
                <path d="M1 4L3.5 6.5L9 1" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <span class="itext">${desc}</span>
          </div>`;
    });
    html += `</div></div>`;
  });
  html += `<button class="btn-reset-tab" onclick="resetTab()">↺ Reset ${activeTab}</button>`;
  document.getElementById('view-checklist').innerHTML = html;
}

function toggleItem(k) {
  state[k] = !state[k];
  saveState();
  updateCounters();
  renderChecklist();
  if (activeView === 'report') renderReport();
  if (activeView === 'summary') renderSummary();
}

// ── REPORT RENDER ────────────────────────────────────────────
function renderReport() {
  const errors = getErrors();
  const c = getCounts();
  let html = `
    <div class="report-header">
      <div>
        <div class="report-title">Error Report</div>
        <div class="report-sub">Lista de errores encontrados — lista para copiar al tracker</div>
      </div>
      <div class="report-actions">
        <button class="btn-copy" id="btn-copy" onclick="copyReport()">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="4" y="4" width="9" height="9" rx="1.5" stroke="white" stroke-width="1.4"/><path d="M4 3V2.5A1.5 1.5 0 0 0-1.5 0H1A1.5 1.5 0 0 0 2.5 1.5V2" stroke="white" stroke-width="1.4" transform="translate(1 1)"/></svg>
          Copiar para tracker
        </button>
      </div>
    </div>`;

  if (errors.length === 0) {
    html += `
      <div class="no-errors-msg">
        <div class="no-errors-icon">✅</div>
        <h3>Sin errores registrados</h3>
        <p>Marca errores en el checklist y aparecerán aquí automáticamente.</p>
      </div>`;
  } else {
    html += `
      <table class="report-table">
        <thead>
          <tr>
            <th class="rt-del">Deliverable</th>
            <th class="rt-level">Nivel</th>
            <th class="rt-desc">Descripción del Error</th>
          </tr>
        </thead>
        <tbody>`;
    errors.forEach(({tab, sec, desc}) => {
      const lvlCls = LEVEL_TD[sec] || '';
      const lvlName = LEVEL_CFG[sec]?.name || sec;
      html += `
          <tr>
            <td class="rt-del">${tab}</td>
            <td class="rt-level ${lvlCls}">${lvlName}</td>
            <td class="rt-desc">${desc}</td>
          </tr>`;
    });
    html += `</tbody></table>
      <div class="copy-hint">
        💡 Haz clic en <b>Copiar para tracker</b> para copiar la lista completa de errores al portapapeles, lista para pegarla en tu celda de Excel o tracker.
      </div>`;
  }

  document.getElementById('view-report').innerHTML = html;
}

function copyReport() {
  const errors = getErrors();
  if (errors.length === 0) return;
  const wo = document.getElementById('m-wo').value;
  const drafter = document.getElementById('m-drafter').value;
  const date_ = document.getElementById('m-date').value;

  let text = `E&O QA Report\n`;
  if (wo)      text += `WO: ${wo}\n`;
  if (drafter) text += `Drafter: ${drafter}\n`;
  if (date_)   text += `Date: ${date_}\n`;
  text += `Total errors: ${errors.length}\n\n`;
  text += `DELIVERABLE\tLEVEL\tDESCRIPTION\n`;
  errors.forEach(({tab, sec, desc}) => {
    const lvlName = LEVEL_CFG[sec]?.name || sec;
    text += `${tab}\t${lvlName}\t${desc}\n`;
  });

  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('btn-copy');
    if (btn) {
      btn.textContent = '✓ Copiado!';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="4" y="4" width="9" height="9" rx="1.5" stroke="white" stroke-width="1.4"/><path d="M4 3V2.5A1.5 1.5 0 0 0-1.5 0H1A1.5 1.5 0 0 0 2.5 1.5V2" stroke="white" stroke-width="1.4" transform="translate(1 1)"/></svg> Copiar para tracker`;
        btn.classList.remove('copied');
      }, 2000);
    }
  });
}

// ── SUMMARY RENDER ───────────────────────────────────────────
function renderSummary() {
  const c = getCounts();
  let html = `
    <div class="report-title" style="margin-bottom:16px">Summary</div>
    <div class="summary-grid">
      <div class="sum-card c-l1"><div class="sum-card-lbl">L1 — Minor</div><div class="sum-card-val">${c.l1}</div></div>
      <div class="sum-card c-l2"><div class="sum-card-lbl">L2 — Significant</div><div class="sum-card-val">${c.l2}</div></div>
      <div class="sum-card c-l3"><div class="sum-card-lbl">L3 — Detrimental</div><div class="sum-card-val">${c.l3}</div></div>
      <div class="sum-card c-pol"><div class="sum-card-lbl">Policy</div><div class="sum-card-val">${c.pol}</div></div>
      <div class="sum-card c-total"><div class="sum-card-lbl">Total</div><div class="sum-card-val">${c.total}</div></div>
    </div>
    <table class="sum-table">
      <thead>
        <tr>
          <th>Deliverable</th>
          <th>L1</th><th>L2</th><th>L3</th><th>Policy</th><th>Total</th>
        </tr>
      </thead>
      <tbody>`;
  TABS.forEach(tab => {
    const tc = getCounts(tab);
    html += `
        <tr>
          <td><b>${tab}</b></td>
          <td class="num-cell num-l1">${tc.l1||'-'}</td>
          <td class="num-cell num-l2">${tc.l2||'-'}</td>
          <td class="num-cell num-l3">${tc.l3||'-'}</td>
          <td class="num-cell num-pol">${tc.pol||'-'}</td>
          <td class="num-cell num-tot">${tc.total||'-'}</td>
        </tr>`;
  });
  html += `</tbody></table>`;
  document.getElementById('view-summary').innerHTML = html;
}

// ── NAVIGATION ───────────────────────────────────────────────
function switchView(v) {
  activeView = v;
  document.getElementById('view-checklist').style.display = v==='checklist' ? '' : 'none';
  document.getElementById('view-report').style.display    = v==='report'    ? '' : 'none';
  document.getElementById('view-summary').style.display   = v==='summary'   ? '' : 'none';
  document.getElementById('page-title').textContent =
    v==='checklist' ? activeTab :
    v==='report'    ? 'Error Report' : 'Summary';
  updateNavActive();
  if (v==='report')  renderReport();
  if (v==='summary') renderSummary();
}

function switchTab(tab) {
  activeTab = tab;
  switchView('checklist');
  renderChecklist();
  updateCounters();
}

function resetTab() {
  if (!confirm(`¿Limpiar todos los errores de "${activeTab}"?`)) return;
  Object.entries(DATA[activeTab]).forEach(([sec, items]) => {
    items.forEach((_,i) => { delete state[storageKey(activeTab,sec,i)]; });
  });
  saveState();
  renderChecklist();
  updateCounters();
}

function confirmResetAll() {
  if (!confirm('¿Limpiar TODO el checklist? Esta acción no se puede deshacer.')) return;
  state = {};
  saveState();
  renderChecklist();
  updateCounters();
  if (activeView==='report') renderReport();
  if (activeView==='summary') renderSummary();
}

// ── INIT ─────────────────────────────────────────────────────
function init() {
  loadState();
  // Restore meta
  document.getElementById('m-wo').value       = meta.wo       || '';
  document.getElementById('m-drafter').value  = meta.drafter  || '';
  document.getElementById('m-reviewer').value = meta.reviewer || '';
  document.getElementById('m-date').value     = meta.date     || new Date().toISOString().split('T')[0];
  buildNav();
  renderChecklist();
  updateCounters();
}

init();
</script>
